<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Sync Pro</title>
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json,{'name':'Meal Sync Pro','short_name':'MealSync','start_url':'./index.html','display':'fullscreen','background_color':'#121212','theme_color':'#121212','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/2276/2276931.png','sizes':'512x512','type':'image/png','purpose':'any maskable'}]}" />
    
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1e1e1e;
            --md-sys-color-surface-variant: #2d2d2d;
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-secondary: #c2e7ff;
            --md-sys-color-surprise: #ffb74d;
            --md-sys-color-fridge: #85e3b3;
            --md-sys-color-success: #34a853;
            --md-sys-color-text: #e3e2e6;
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--md-sys-color-background); color: var(--md-sys-color-text); margin: 0; padding: 20px; min-height: 100vh; }
        .app-container { max-width: 440px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; min-height: 100vh; }
        
        .btn { border: none; padding: 18px; border-radius: 100px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; width: 100%; }

        .suggestion-list { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        
        .meal-card { background: var(--md-sys-color-surface-variant); border-radius: 24px; padding: 20px; }
        .meal-name { font-size: 20px; font-weight: 500; margin: 5px 0 15px 0; }
        
        .card-explicit-actions-bar { display: flex; gap: 10px; }
        .action-bar-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
        
        .btn-action-change { background: #333; color: white; }
        .btn-action-lock { background: var(--md-sys-color-success); color: white; }
        .btn-action-recipe { background: var(--md-sys-color-primary); color: #000; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--md-sys-color-surface); padding: 24px; border-radius: 30px; height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Meal Sync Pro</h1>
        <main id="suggestions" class="suggestion-list"></main>
        
        <div class="bottom-action-console">
            <button id="fridgeBtn" class="btn" style="background:var(--md-sys-color-fridge); color:#000">🥦 Fridge Items</button>
            <button id="surpriseBtn" class="btn" style="background:var(--md-sys-color-surprise); color:#000">✨ Surprise ME!</button>
            <button id="generateBtn" class="btn" style="background:var(--md-sys-color-secondary); color:#000">🍽️ What to EAT Today?</button>
        </div>
    </div>

    <div id="recipeModal" class="modal">
        <div class="modal-content">
            <h3 id="recipeTitle">Recipe</h3>
            <button onclick="document.getElementById('recipeModal').style.display='none'" style="margin-bottom:20px;">Close</button>
            <div id="recipeButtons" style="display:flex; gap:10px;">
                <button id="youtubeRecipeBtn" class="btn btn-secondary">▶ YouTube</button>
                <button id="googleRecipeBtn" class="btn btn-secondary">🔍 Google</button>
            </div>
        </div>
    </div>

    <script>
        const db = JSON.parse(localStorage.getItem('mealDb')) || { breakfast: ["Poha"], lunch: ["Dal Rice"], dinner: ["Khichdi"] };
        let currentMeal = "";

        function renderOutputDeck(schema) {
            const out = document.getElementById('suggestions');
            out.innerHTML = "";
            schema.forEach((s, index) => {
                out.insertAdjacentHTML('beforeend', `
                    <div class="meal-card">
                        <span style="font-size: 12px; color: var(--md-sys-color-primary);">${s.time}</span>
                        <div class="meal-name">${s.name}</div>
                        <div class="card-explicit-actions-bar">
                            <button class="action-bar-btn btn-action-lock" onclick="confirm(this)">✅ Eat</button>
                            <button class="action-bar-btn btn-action-change" onclick="refresh(${index}, '${s.time.toLowerCase()}')">🔄 Change</button>
                            <button class="action-bar-btn btn-action-recipe" onclick="openRecipe('${s.name}')">📖 Recipe</button>
                        </div>
                    </div>
                `);
            });
        }

        function refresh(index, cat) {
            const el = document.querySelectorAll('.meal-name')[index];
            el.innerText = db[cat.split(' ')[0]][Math.floor(Math.random() * db[cat.split(' ')[0]].length)];
        }

        function confirm(btn) { btn.innerText = "Confirmed!"; btn.style.background = "#555"; }

        function openRecipe(name) {
            currentMeal = name;
            document.getElementById("recipeTitle").innerText = name;
            document.getElementById("recipeModal").style.display = "flex";
        }

        document.getElementById("googleRecipeBtn").onclick = () => window.open(`https://google.com/search?q=${currentMeal}+recipe`, "_blank");
        document.getElementById("youtubeRecipeBtn").onclick = () => window.open(`https://youtube.com/results?search_query=${currentMeal}+recipe`, "_blank");

        document.getElementById('generateBtn').addEventListener('click', () => {
            renderOutputDeck([
                { time: "Breakfast", name: db.breakfast[0] },
                { time: "Lunch", name: db.lunch[0] },
                { time: "Dinner", name: db.dinner[0] }
            ]);
        });
        
        // Add listeners for Fridge and Surprise here if needed...
    </script>
</body>
</html>
