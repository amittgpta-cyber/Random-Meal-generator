<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Sync Pro</title>
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjogIk1lYWwgU3luYyIsICJzaG9ydF9uYW1lIjogIk1lYWxTeW5jIiwgInN0YXJ0X3VybCI6ICIuLyIsICJkaXNwbGF5IjogImZ1bGxzY3JlZW4iLCAidGhlbWVfY29sb3IiOiAiIzEyMTIxMiIsICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMxMjEyMTIiLCAiaWNvbnMiOiBbe3s6IjE5MngxOTIiLCJ0IjoiaW1hZ2UvcG5nIiwic3JjIjoiaHR0cHM6Ly92aWEucGxhY2Vob2xkZ3IuY29tLzE5MiJ9XX0=">
    
    <!-- Core Engine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1e1e1e;
            --md-sys-color-surface-variant: #2d2d2d;
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-on-primary: #062e6f;
            --md-sys-color-secondary: #c2e7ff;
            --md-sys-color-on-secondary: #003355;
            --md-sys-color-surprise: #ffb74d;
            --md-sys-color-on-surprise: #4e2600;
            --md-sys-color-fridge: #85e3b3;
            --md-sys-color-on-fridge: #003822;
            --md-sys-color-success: #34a853;
            --md-sys-color-on-success: #ffffff;
            --md-sys-color-text: #e3e2e6;
            --md-sys-color-text-variant: #c7c6ca;
            --md-sys-color-error: #ffb4ab;
        }

        body { 
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            background-color: var(--md-sys-color-background); 
            color: var(--md-sys-color-text);
            margin: 0; 
            padding: calc(24px + env(safe-area-inset-top)) 20px calc(320px + env(safe-area-inset-bottom)) 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.07;
            filter: blur(40px);
            z-index: -1;
            pointer-events: none;
        }

        .app-container { 
            max-width: 440px; 
            width: 100%; 
            display: flex;
            flex-direction: column;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 0 4px;
        }

        h1 { 
            color: var(--md-sys-color-text); 
            font-size: 2.25rem; 
            font-weight: 400; 
            margin: 0; 
            letter-spacing: -0.5px;
            line-height: 1.25;
        }
        
        .btn { 
            border: none; 
            padding: 18px 24px; 
            border-radius: 100px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: 600; 
            width: 100%; 
            box-sizing: border-box; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s ease, filter 0.2s;
        }
        .btn:active { transform: scale(0.98); }

        .bottom-action-console {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: linear-gradient(to top, rgba(18,18,18,1) 0%, rgba(18,18,18,0.98) 85%, rgba(18,18,18,0) 100%);
            padding: 40px 20px calc(24px + env(safe-area-inset-bottom)) 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 14px; 
            z-index: 99;
            pointer-events: auto;
        }

        .btn-fab-main { 
            background-color: var(--md-sys-color-secondary); 
            color: var(--md-sys-color-on-secondary);
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.2px;
            padding: 20px 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .btn-fab-surprise { 
            background-color: var(--md-sys-color-surprise); 
            color: var(--md-sys-color-on-surprise);
            font-size: 16px;
            font-weight: 600;
            padding: 18px 24px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .btn-fab-fridge {
            background-color: var(--md-sys-color-fridge);
            color: var(--md-sys-color-on-fridge);
            font-size: 16px;
            font-weight: 600;
            padding: 18px 24px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .btn-secondary { background-color: var(--md-sys-color-surface-variant); color: var(--md-sys-color-text); padding: 12px 20px; font-size: 14px; }
        .btn-danger { background-color: #f44336; color: white; padding: 8px 16px; font-size: 13px; width: auto; border-radius: 10px; display: inline-block; margin: 0; font-weight: 600; }
        
        .import-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .import-label { background-color: var(--md-sys-color-surface-variant); color: var(--md-sys-color-text); padding: 166px; padding: 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .custom-file-input { display: none; }
        
        #uploadStatus { font-weight: 500; color: var(--md-sys-color-primary); font-size: 13px; white-space: pre-line; margin-bottom: 16px; text-align: center; }
        
        .suggestion-list { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin-top: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        
        /* Enriched and significantly enlarged container boxes on both main page and modals */
        .meal-card {
            background: var(--md-sys-color-surface-variant);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 140px; /* Enhanced height scale parameters to prevent tight visual compression loops */
        }
        .meal-card.locked-state {
            border: 1px solid var(--md-sys-color-success);
            background-color: rgba(52, 168, 83, 0.04);
        }
        .meal-card:hover { background-color: #333333; }
        .meal-card.locked-state:hover { background-color: rgba(52, 168, 83, 0.06); }

        .meal-details { padding: 24px 24px 16px 24px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .meal-time { font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--md-sys-color-primary); letter-spacing: 0.7px; }
        .meal-name { font-size: 21px; font-weight: 400; color: var(--md-sys-color-text); line-height: 1.3; }
        .ai-badge { align-self: flex-start; font-size: 11px; font-weight: 700; background: rgba(168, 199, 250, 0.15); color: var(--md-sys-color-primary); padding: 4px 10px; border-radius: 6px; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Explicit action command bar stacked neatly inside container bounds framework layout */
        .card-explicit-actions-bar {
            display: flex;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            background-color: rgba(0, 0, 0, 0.18);
            width: 100%;
        }
        
        /* Drastically boosted explicit text command layouts for thumb proximity metrics accessibility */
        .action-bar-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 18px 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s, color 0.2s;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }
        
        .btn-action-change {
            color: var(--md-sys-color-text-variant);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-action-change:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--md-sys-color-primary);
        }
        
        .btn-action-lock {
            color: var(--md-sys-color-fridge);
        }
        .btn-action-lock:hover {
            background-color: rgba(133, 227, 179, 0.08);
        }
        
        .meal-card.locked-state .btn-action-lock {
            background-color: var(--md-sys-color-success);
            color: var(--md-sys-color-on-success);
        }
        .meal-card.locked-state .btn-action-change {
            opacity: 0.2;
            pointer-events: none;
        }

        .inline-edit-input {
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-text);
            border: 2px solid var(--md-sys-color-primary);
            border-radius: 12px;
            font-size: 18px;
            padding: 10px 14px;
            margin-top: 6px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }
        .inline-edit-input:focus { outline: none; }
        .inline-save-btn {
            background-color: #34a853;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
            margin-top: 10px;
        }

        /* Enriched Modal container sizes mapping properties correctly across dimensions */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .modal-content { background: var(--md-sys-color-surface); width: 94%; max-width: 520px; height: 90vh; border-radius: 36px; padding: 28px; display: flex; flex-direction: column; box-shadow: 0 16px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 1.85rem; font-weight: 400; margin: 0; }

        .modal-body { flex: 1; overflow-y: auto; padding-right: 4px; -webkit-overflow-scrolling: touch; }
        .table-section { margin-bottom: 28px; }
        .table-section h4 { margin: 0 0 14px 0; color: var(--md-sys-color-primary); border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; font-weight: 600; font-size: 16px; letter-spacing: 0.5px; }
        
        /* Enlarged rows container elements inside source layout panels dashboards */
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.01); margin-bottom: 6px; border-radius: 12px; }
        .data-cell { font-size: 16px; color: var(--md-sys-color-text); font-weight: 400; }
        
        .unified-add-form { background: var(--md-sys-color-surface-variant); padding: 20px; border-radius: 24px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.04); }
        .unified-add-form h4 { margin: 0 0 14px 0; color: var(--md-sys-color-primary); font-weight: 600; font-size: 15px; }
        .unified-input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
        .add-input { padding: 14px 18px; border: 1px solid rgba(255,255,255,0.1); background: var(--md-sys-color-background); color: var(--md-sys-color-text); border-radius: 14px; font-size: 15px; box-sizing: border-box; width: 100%; -webkit-appearance: none; }
        .add-input:focus { outline: none; border-color: var(--md-sys-color-primary); }

        .excel-table-container { width: 100%; overflow-x: auto; background: var(--md-sys-color-background); border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); margin-top: 12px; max-height: 55vh; -webkit-overflow-scrolling: touch; }
        .excel-grid { width: 100%; border-collapse: collapse; min-width: 440px; }
        .excel-grid th { background: var(--md-sys-color-surface-variant); color: var(--md-sys-color-primary); font-weight: 600; font-size: 15px; padding: 14px 10px; text-align: left; border-bottom: 2px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 10; }
        .excel-grid td { padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .grid-cell-input { width: 100%; border: none; background: transparent; color: var(--md-sys-color-text); font-size: 15px; padding: 10px; box-sizing: border-box; border-radius: 8px; }
        .grid-cell-input:focus { background: var(--md-sys-color-surface-variant); outline: 2px solid var(--md-sys-color-primary); }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Meal Sync Pro</h1>
            <button id="openDataBtn" class="btn btn-secondary" style="width:auto; margin:0; border-radius:100px;">📊 Meal Data</button>
        </header>

        <main id="suggestions" class="suggestion-list"></main>

        <div class="bottom-action-console">
            <button id="fridgeBtn" class="btn btn-fab-fridge">🥦 What's in the Fridge!</button>
            <button id="surpriseBtn" class="btn btn-fab-surprise">✨ Surprise ME!</button>
            <button id="generateBtn" class="btn btn-fab-main">🍽️ What to EAT Today?</button>
        </div>
    </div>

    <!-- Spreadsheet Data View Management Overlay -->
    <div id="dataModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Spreadsheet Source</h3>
                <button id="closeDataBtn" style="background:none; border:none; font-size:28px; cursor:pointer; color:var(--md-sys-color-text-variant);">&times;</button>
            </div>
            
            <div id="modalToolbar">
                <div class="import-grid">
                    <input type="file" id="fileUploadInput" class="custom-file-input" accept="image/*,.pdf,.docx,.xlsx,.xls">
                    <label for="fileUploadInput" class="import-label">📁 Upload File</label>

                    <input type="file" id="cameraCaptureInput" class="custom-file-input" accept="image/*" capture="environment">
                    <label for="cameraCaptureInput" class="import-label" style="background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);">📷 Open Camera</label>
                </div>
                
                <div id="uploadStatus"></div>
                
                <div style="margin-bottom: 16px; display:flex; gap:8px;">
                    <button id="excelToggleBtn" class="btn btn-secondary" style="margin:0; flex:1; border-radius:12px; background-color: #34a853; color: white; border: none;">📝 Excel Edit</button>
                    <button id="exportExcelBtn" class="btn btn-secondary" style="margin:0; flex:1; border-radius:12px;">📥 Export Excel</button>
                    <button id="clearDbBtn" class="btn btn-secondary" style="margin:0; color:var(--md-sys-color-error); flex:0.5; border-radius:12px;">🗑️ Reset</button>
                </div>

                <!-- Unified Three Box Category Input Component Container -->
                <div class="unified-add-form">
                    <h4>Add Custom Item Entry</h4>
                    <div class="unified-input-group">
                        <input type="text" id="unified-breakfast" class="add-input" placeholder="Breakfast meal item...">
                        <input type="text" id="unified-lunch" class="add-input" placeholder="Lunch meal item...">
                        <input type="text" id="unified-dinner" class="add-input" placeholder="Dinner meal item...">
                    </div>
                    <button id="saveUnifiedBtn" class="btn btn-primary" style="margin:0; border-radius:12px; padding:12px;">💾 SAVE</button>
                </div>
            </div>

            <div class="modal-body" id="modalTableBody"></div>
            
            <div class="modal-body" id="modalExcelBody" style="display: none;">
                <p style="margin:0 0 12px 0; font-size:12px; color:var(--md-sys-color-text-variant);">Modify individual items directly inside the spreadsheet matrix cells below.</p>
                
                <div class="excel-table-container">
                    <table class="excel-grid">
                        <thead>
                            <tr>
                                <th>Breakfast</th>
                                <th>Lunch</th>
                                <th>Dinner</th>
                            </tr>
                        </thead>
                        <tbody id="excelGridTbody"></tbody>
                    </table>
                </div>
                
                <button id="saveExcelTextBtn" class="btn btn-primary" style="margin-top:16px; border-radius:12px;">✔️ SAVE</button>
            </div>
        </div>
    </div>

    <!-- Fridge Input Prompt Modal Overlay -->
    <div id="fridgeModal" class="modal">
        <div class="modal-content" style="height: auto; max-height: 80vh;">
            <div class="modal-header">
                <h3 style="margin:0; font-weight:400; color:var(--md-sys-color-text);">What's in the Fridge?</h3>
                <button id="closeFridgeBtn" style="background:none; border:none; font-size:28px; cursor:pointer; color:var(--md-sys-color-text-variant);">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin:0 0 16px 0; font-size:14px; color:var(--md-sys-color-text-variant);">Enter raw ingredients or items available (separated by commas):</p>
                <input type="text" id="fridgeIngredientsInput" class="add-input" placeholder="e.g., Paneer, Shimla Mirch, Aaloo, Tomato" style="margin-bottom:16px;">
                <button id="submitFridgeIngredientsBtn" class="btn btn-primary" style="margin:0; border-radius:12px; background-color:var(--md-sys-color-fridge); color:var(--md-sys-color-on-fridge);">🔍 Match Ingredients</button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const EXCEL_DB_KEY = 'spreadsheetMealDatabase';
        const AI_HISTORY_KEY = 'mealSyncAIHistory';
        const AI_WEIGHTS_KEY = 'mealSyncAIWeights';
        
        const freshSeedData = {
            breakfast: ["Aalu Paratha", "Paneer Paratha", "Methi Paratha / Boondi Raita", "Guacamole toast (Avocado)", "Idli chutney / Sambhar", "Dosa Sambhar / chutney", "Veg Sandwich", "Paneer Sandwich", "Poha", "Vermicelli", "Sabudana khichdi", "Omelette", "Bun omelette", "Bun sandwich / Burger", "Moong daal cheela & chatni"],
            lunch: ["Methi Aalu / Moong Daal Roti", "Aalu / Kadhi Chawal", "Aalu Shimla mirch Roti", "Lauki Kofta Chawal", "Tindli / Moong Daal", "Kaddu Roti", "Soya Aalu Sabji Chawal", "Matar Aalu sabji Chawal / Roti", "Paneer Sabji Roti", "Parval Subji / Moong daal Roti", "Arhar daal / Toor Daal / Aalu Sabji / Roti / Chawal", "Lauki sabji Roti", "Rajma Chawal", "Chole Chawal", "Bhel", "Brown Daal / Roti / Chawal", "Udad daal Roti / Chawal", "Chana Daal / Lauki Chawal", "Mix Daal Roti", "Paneer Bhurji Roti", "Nutri Kulcha", "Kala chana chat / Roti", "Lobiya Chawal"],
            dinner: ["Egg Biryani", "Paneer Bhurji / chutney", "Noodles / Pasta", "Methi Aalu / Moong Daal Roti", "Aalu / Kadhi Chawal", "Aalu Shimla mirch Roti", "Lauki Kofta Chawal", "Tindli / Moong Daal", "Kaddu Roti", "Soya Aalu Sabji Chawal", "Matar Aalu sabji Chawal / Roti", "Paneer Sabji Roti", "Parval Subji / Moong daal Roti", "Arhar daal / Toor Daal / Aalu Sabji / Roti / Chawal", "Lauki sabji Roti", "Rajma Chawal", "Chole Chawal", "Egg curry rice", "Jeera Aalu Roti", "Khichdi dahi / Achar", "Daliya Veg", "Sattu Paratha"]
        };

        const surpriseMasterPool = {
            breakfast: ["Veg Upma", "Masala Scrambled Eggs with Toast", "Appam with Vegetable Stew", "Methi Thepla with Curd", "Egg Bhurji Roll", "Vegetable Dalia"],
            lunch: ["Paneer Bhurji with Tandoori Roti", "Chole Bhature with Pickle", "Veg Biryani with Raita", "Jeera Rice with Dal Makhani", "Aloo Shimla Mirch Curry", "Rajma Chawal"],
            dinner: ["Vegetable Khichdi with Papad", "Egg Curry with Steamed Rice", "Palak Paneer with Roti", "Baingan Bharta with Missi Roti", "Lauki Kofta Curry", "Pav Bhaji"]
        };

        let db = freshSeedData;
        if (localStorage.getItem(EXCEL_DB_KEY)) db = JSON.parse(localStorage.getItem(EXCEL_DB_KEY));
        else localStorage.setItem(EXCEL_DB_KEY, JSON.stringify(db));

        let aiHistory = JSON.parse(localStorage.getItem(AI_HISTORY_KEY)) || [];
        let aiWeights = JSON.parse(localStorage.getItem(AI_WEIGHTS_KEY)) || {};

        let currentSuggestionsState = [];
        let excelViewActive = false;
        
        const status = document.getElementById('uploadStatus');
        const dataModal = document.getElementById('dataModal');
        const fridgeModal = document.getElementById('fridgeModal');
        const modalTableBody = document.getElementById('modalTableBody');
        const modalExcelBody = document.getElementById('modalExcelBody');
        const modalToolbar = document.getElementById('modalToolbar');
        const excelToggleBtn = document.getElementById('excelToggleBtn');
        const modalTitle = document.getElementById('modalTitle');
        const excelGridTbody = document.getElementById('excelGridTbody');

        document.getElementById('fileUploadInput').addEventListener('change', handleFileRouting);
        document.getElementById('cameraCaptureInput').addEventListener('change', handleFileRouting);

        document.getElementById('fridgeBtn').addEventListener('click', () => { fridgeModal.style.display = "flex"; });
        document.getElementById('closeFridgeBtn').addEventListener('click', () => { fridgeModal.style.display = "none"; });
        document.getElementById('submitFridgeIngredientsBtn').addEventListener('click', runFridgeMatchingPipeline);

        function handleFileRouting(e) {
            const file = e.target.files[0];
            if (!file) return;
            const name = file.name.toLowerCase();
            status.style.color = "var(--md-sys-color-primary)";

            if (file.type.match('image.*')) {
                status.innerText = "Scanning Image via OCR Engine...";
                Tesseract.recognize(file, 'eng').then(({ data: { text } }) => { parseTextPool(text); });
            } else if (name.endsWith('.pdf')) {
                status.innerText = "Extracting raw PDF text lines...";
                processPDF(file);
            } else if (name.endsWith('.docx')) {
                status.innerText = "Extracting Word sequences...";
                processDocx(file);
            } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
                status.innerText = "Processing Excel Matrix...";
                processExcel(file);
            }
        }

        function processPDF(file) {
            const reader = new FileReader();
            reader.onload = function() {
                const arr = new Uint8Array(this.result);
                pdfjsLib.getDocument(arr).promise.then(pdf => {
                    let pages = [];
                    for(let i=1; i<=pdf.numPages; i++) {
                        pages.push(pdf.getPage(i).then(p => p.getTextContent().then(t => t.items.map(m => m.str).join(' '))));
                    }
                    Promise.all(pages).then(res => parseTextPool(res.join('\n')));
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function processDocx(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                mammoth.extractRawText({ arrayBuffer: e.target.result }).then(res => parseTextPool(res.value));
            };
            reader.readAsArrayBuffer(file);
        }

        function processExcel(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                if(json.length > 1) {
                    const headers = json[0].map(h => String(h).toLowerCase().trim());
                    const bIdx = headers.indexOf('breakfast');
                    const lIdx = headers.indexOf('lunch');
                    const dIdx = headers.indexOf('dinner');

                    for(let i = 1; i < json.length; i++) {
                        const row = json[i];
                        if(bIdx > -1 && row[bIdx]) db.breakfast.push(String(row[bIdx]).trim());
                        if(lIdx > -1 && row[lIdx]) db.lunch.push(String(row[lIdx]).trim());
                        if(dIdx > -1 && row[dIdx]) db.dinner.push(String(row[dIdx]).trim());
                    }
                    saveDatabase();
                    status.innerText = "Excel sheet merged perfectly!";
                    status.style.color = "#34a853";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function parseTextPool(text) {
            const chunks = text.replace(/[\r\\•]/g, '\n').split(/[\n,\;\•]|\s{3,}/).map(c => c.trim()).filter(c => c.length > 2);
            chunks.forEach(chunk => {
                const low = chunk.toLowerCase();
                if (low === 'breakfast' || low === 'lunch' || low === 'dinner') return;
                
                if (low.includes('breakfast') || low.includes('morning')) db.breakfast.push(chunk.replace(/breakfast/i,'').replace(/[:\-–—]/g,'').trim());
                else if (low.includes('lunch') || low.includes('afternoon')) db.lunch.push(chunk.replace(/lunch/i,'').replace(/[:\-–—]/g,'').trim());
                else if (low.includes('dinner') || low.includes('night')) db.dinner.push(chunk.replace(/dinner/i,'').replace(/[:\-–—]/g,'').trim());
                else {
                    const target = Math.min(db.breakfast.length, db.lunch.length, db.dinner.length);
                    if (db.breakfast.length === target) db.breakfast.push(chunk);
                    else if (db.lunch.length === target) db.lunch.push(chunk);
                    else db.dinner.push(chunk);
                }
            });
            saveDatabase();
            status.innerText = "Text data synchronized!";
            status.style.color = "#34a853";
        }

        function saveDatabase() {
            localStorage.setItem(EXCEL_DB_KEY, JSON.stringify(db));
            if (!excelViewActive) renderSpreadsheetModal();
        }

        function getSmartAIMealSelection(categoryArr, timeOfDay) {
            if (!categoryArr.length) return "No meals added";
            
            const historicalExclusions = aiHistory.slice(-21).map(h => h.name.toLowerCase().trim());
            const availableOptions = categoryArr.filter(meal => !historicalExclusions.includes(meal.toLowerCase().trim()));
            const calculationPool = availableOptions.length ? availableOptions : categoryArr;

            let scores = calculationPool.map(meal => {
                let baseWeight = aiWeights[meal] || 1;
                return { name: meal, weight: baseWeight };
            });

            let totalWeight = scores.reduce((sum, s) => sum + s.weight, 0);
            let randomTarget = Math.random() * totalWeight;
            
            let runningSum = 0;
            for (let score of scores) {
                runningSum += score.weight;
                if (randomTarget <= runningSum) {
                    return score.name;
                }
            }
            return calculationPool[Math.floor(Math.random() * calculationPool.length)];
        }

        function logSingleMealSelection(mealName, timeOfDay) {
            if (mealName === "No meals added") return;
            aiHistory.push({ time: timeOfDay, name: mealName });
            aiWeights[mealName] = (aiWeights[mealName] || 1) + 0.5;

            if (aiHistory.length > 42) aiHistory.shift();

            localStorage.setItem(AI_HISTORY_KEY, JSON.stringify(aiHistory));
            localStorage.setItem(AI_WEIGHTS_KEY, JSON.stringify(aiWeights));
        }

        function runFridgeMatchingPipeline() {
            const rawInput = document.getElementById('fridgeIngredientsInput').value.trim();
            if (!rawInput) {
                alert("Please type at least one raw ingredient item.");
                return;
            }

            const items = rawInput.toLowerCase().split(',').map(i => i.trim()).filter(i => i.length > 1);
            if (!items.length) return;

            fridgeModal.style.display = "none";

            const findBestPoolMatches = (sourcePool) => {
                return sourcePool.filter(meal => {
                    const lowerMeal = meal.toLowerCase();
                    return items.some(ingredient => lowerMeal.includes(ingredient));
                });
            };

            let bMatches = findBestPoolMatches(db.breakfast);
            let lMatches = findBestPoolMatches(db.lunch);
            let dMatches = findBestPoolMatches(db.dinner);

            let surpriseUsedB = false, surpriseUsedL = false, surpriseUsedD = false;
            
            if (!bMatches.length) { bMatches = findBestPoolMatches(surpriseMasterPool.breakfast); surpriseUsedB = true; }
            if (!lMatches.length) { lMatches = findBestPoolMatches(surpriseMasterPool.lunch); surpriseUsedL = true; }
            if (!dMatches.length) { dMatches = findBestPoolMatches(surpriseMasterPool.dinner); surpriseUsedD = true; }

            const pickFinalResult = (matchPool, fallbackSource) => {
                return matchPool.length ? matchPool[Math.floor(Math.random() * matchPool.length)] : fallbackSource[Math.floor(Math.random() * fallbackSource.length)];
            };

            const finalB = pickFinalResult(bMatches, db.breakfast);
            const finalL = pickFinalResult(lMatches, db.lunch);
            const finalD = pickFinalResult(dMatches, db.dinner);

            renderOutputDeck([
                { time: `Breakfast ${surpriseUsedB && bMatches.length ? '(Surprise Match)' : '(Fridge Match)'}`, name: finalB, isSurprise: surpriseUsedB, isLocked: false },
                { time: `Lunch ${surpriseUsedL && lMatches.length ? '(Surprise Match)' : '(Fridge Match)'}`, name: finalL, isSurprise: surpriseUsedL, isLocked: false },
                { time: `Dinner ${surpriseUsedD && dMatches.length ? '(Surprise Match)' : '(Fridge Match)'}`, name: finalD, isSurprise: surpriseUsedD, isLocked: false }
            ]);
        }

        function renderOutputDeck(schema) {
            currentSuggestionsState = JSON.parse(JSON.stringify(schema)); 
            const out = document.getElementById('suggestions');
            out.innerHTML = "";
            
            currentSuggestionsState.forEach((s, index) => {
                out.insertAdjacentHTML('beforeend', `
                    <div class="meal-card" id="suggestion-card-${index}" onclick="enableInlineCardEditing(${index})">
                        <div class="meal-details" id="suggestion-details-${index}">
                            <span class="meal-time">${s.time}</span>
                            <span class="meal-name" id="suggestion-name-text-${index}">${s.name}</span>
                            ${s.isSurprise ? '' : '<span class="ai-badge">AI Optimized</span>'}
                        </div>
                        
                        <div class="card-explicit-actions-bar">
                            <button class="action-bar-btn btn-action-change" onclick="refreshSpecificCategoryCard(event, ${index})">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                                Change
                            </button>
                            <button class="action-bar-btn btn-action-lock" onclick="lockChoiceIntoExclusionMemory(event, ${index})">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                                I'll EAT IT
                            </button>
                        </div>
                    </div>
                `);
            });
        }

        window.lockChoiceIntoExclusionMemory = function(event, index) {
            event.stopPropagation(); 
            
            const cardState = currentSuggestionsState[index];
            const cardElement = document.getElementById('suggestion-card-' + index);
            const baseCategoryLabel = cardState.time.split(' ')[0]; 

            if (cardState.isLocked) return; 

            logSingleMealSelection(cardState.name, baseCategoryLabel);
            
            cardState.isLocked = true;
            cardElement.classList.add('locked-state');

            const statusBadge = document.createElement('span');
            statusBadge.className = 'ai-badge';
            statusBadge.style.backgroundColor = 'var(--md-sys-color-success)';
            statusBadge.style.color = 'white';
            statusBadge.innerText = "✓ Choice Saved";
            document.getElementById('suggestion-details-' + index).appendChild(statusBadge);
            
            const lockBtn = cardElement.querySelector('.btn-action-lock');
            if (lockBtn) lockBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Confirmed';
        };

        window.refreshSpecificCategoryCard = function(event, index) {
            event.stopPropagation(); 
            
            const cardState = currentSuggestionsState[index];
            if (cardState.isLocked) return; 

            const cleanCategoryKey = cardState.time.split(' ')[0].toLowerCase(); 
            let newMealName = "No meals added";

            if (cardState.isSurprise || cardState.time.includes('Surprise')) {
                const filterSurprise = (pool, userDb) => {
                    const normalizedDb = userDb.map(i => i.toLowerCase().trim());
                    return pool.filter(i => !normalizedDb.includes(i.toLowerCase().trim()));
                };
                const surprisePool = filterSurprise(surpriseMasterPool[cleanCategoryKey], db[cleanCategoryKey]);
                if (surprisePool.length) {
                    newMealName = surprisePool[Math.floor(Math.random() * surprisePool.length)];
                }
            } else {
                const capitalCategoryLabel = cleanCategoryKey.charAt(0).toUpperCase() + cleanCategoryKey.slice(1);
                newMealName = getSmartAIMealSelection(db[cleanCategoryKey], capitalCategoryLabel);
            }

            cardState.name = newMealName;
            const textEl = document.getElementById(`suggestion-name-text-${index}`);
            if (textEl) textEl.innerText = newMealName;
        };

        window.enableInlineCardEditing = function(index) {
            const cardState = currentSuggestionsState[index];
            if (cardState.isLocked) return; 

            const detailsBox = document.getElementById(`suggestion-details-${index}`);
            const textEl = document.getElementById(`suggestion-name-text-${index}`);
            if (document.getElementById(`inline-input-field-${index}`)) return;

            const originalValue = textEl.innerText;
            const categoryType = cardState.time.split(' ')[0].toLowerCase(); 

            textEl.style.display = "none";
            
            const editableStructure = `
                <div id="inline-edit-wrap-${index}" onclick="event.stopPropagation();" style="width:100%; display:flex; flex-direction:column;">
                    <input type="text" id="inline-input-field-${index}" class="inline-edit-input" value="${originalValue}">
                    <button class="inline-save-btn" onclick="commitInlineCardUpdate(${index}, '${categoryType}', '${originalValue}')">SAVE</button>
                </div>
            `;
            detailsBox.insertAdjacentHTML('beforeend', editableStructure);
            document.getElementById(`inline-input-field-${index}`).focus();
        };

        window.commitInlineCardUpdate = function(index, category, oldValue) {
            const inputField = document.getElementById(`inline-input-field-${index}`);
            const newValue = inputField.value.trim();

            if (newValue && newValue !== oldValue) {
                const dbIndex = db[category].indexOf(oldValue);
                if (dbIndex !== -1) {
                    db[category][dbIndex] = newValue;
                } else {
                    db[category].push(newValue);
                }
                localStorage.setItem(EXCEL_DB_KEY, JSON.stringify(db));
                currentSuggestionsState[index].name = newValue;
            }

            const wrap = document.getElementById(`inline-edit-wrap-${index}`);
            if (wrap) wrap.remove();
            
            const textElement = document.getElementById(`suggestion-name-text-${index}`);
            textElement.innerText = newValue || oldValue;
            textElement.style.display = "block";
        };

        document.getElementById('generateBtn').addEventListener('click', function() {
            const bChoice = getSmartAIMealSelection(db.breakfast, "Breakfast");
            const lChoice = getSmartAIMealSelection(db.lunch, "Lunch");
            const dChoice = getSmartAIMealSelection(db.dinner, "Dinner");

            renderOutputDeck([
                { time: "Breakfast", name: bChoice, isSurprise: false, isLocked: false },
                { time: "Lunch", name: lChoice, isSurprise: false, isLocked: false },
                { time: "Dinner", name: dChoice, isSurprise: false, isLocked: false }
            ]);
        });

        document.getElementById('surpriseBtn').addEventListener('click', function() {
            const filterSurprise = (pool, userDb) => {
                const normalizedDb = userDb.map(i => i.toLowerCase().trim());
                return pool.filter(i => !normalizedDb.includes(i.toLowerCase().trim()));
            };

            const bSurprise = filterSurprise(surpriseMasterPool.breakfast, db.breakfast);
            const lSurprise = filterSurprise(surpriseMasterPool.lunch, db.lunch);
            const dSurprise = filterSurprise(surpriseMasterPool.dinner, db.dinner);

            renderOutputDeck([
                { time: "Breakfast (Surprise)", name: bSurprise[Math.floor(Math.random() * bSurprise.length)] || "Veg Upma", isSurprise: true, isLocked: false },
                { time: "Lunch (Surprise)", name: lSurprise[Math.floor(Math.random() * lSurprise.length)] || "Veg Biryani", isSurprise: true, isLocked: false },
                { time: "Dinner (Surprise)", name: dSurprise[Math.floor(Math.random() * dSurprise.length)] || "Pav Bhaji", isSurprise: true, isLocked: false }
            ]);
        });

        document.getElementById('openDataBtn').addEventListener('click', () => { 
            status.innerText = ""; 
            excelViewActive = false;
            modalTableBody.style.display = "block";
            modalExcelBody.style.display = "none";
            modalToolbar.style.display = "block";
            excelToggleBtn.innerText = "📝 Excel Edit";
            modalTitle.innerText = "Spreadsheet Source";
            dataModal.style.display = "flex"; 
            renderSpreadsheetModal(); 
        });
        
        document.getElementById('closeDataBtn').addEventListener('click', () => dataModal.style.display = "none");
        document.getElementById('clearDbBtn').addEventListener('click', () => { 
            if(confirm("Clear current database items and learned AI memory?")) { 
                db={breakfast:[],lunch:[],dinner:[]}; 
                aiHistory = [];
                aiWeights = {};
                localStorage.removeItem(AI_HISTORY_KEY);
                localStorage.removeItem(AI_WEIGHTS_KEY);
                saveDatabase(); 
            }
        });

        excelToggleBtn.addEventListener('click', () => {
            excelViewActive = !excelViewActive;
            if (excelViewActive) {
                modalTableBody.style.display = "none";
                modalToolbar.style.display = "none";
                modalExcelBody.style.display = "block";
                excelToggleBtn.innerText = "📋 View Dashboard";
                modalTitle.innerText = "Excel Matrix Editor";
                
                excelGridTbody.innerHTML = "";
                const maxLength = Math.max(db.breakfast.length, db.lunch.length, db.dinner.length);
                const displayRowsCount = maxLength + 3; 

                for (let i = 0; i < displayRowsCount; i++) {
                    const rowHtml = `
                        <tr>
                            <td><input type="text" class="grid-cell-input breakfast-col" value="${db.breakfast[i] || ""}" placeholder="..."></td>
                            <td><input type="text" class="grid-cell-input lunch-col" value="${db.lunch[i] || ""}" placeholder="..."></td>
                            <td><input type="text" class="grid-cell-input dinner-col" value="${db.dinner[i] || ""}" placeholder="..."></td>
                        </tr>
                    `;
                    excelGridTbody.insertAdjacentHTML('beforeend', rowHtml);
                }
            } else {
                modalTableBody.style.display = "block";
                modalToolbar.style.display = "block";
                modalExcelBody.style.display = "none";
                excelToggleBtn.innerText = "📝 Excel Edit";
                modalTitle.innerText = "Spreadsheet Source";
                renderSpreadsheetModal();
            }
        });

        document.getElementById('saveExcelTextBtn').addEventListener('click', () => {
            const bInputs = document.querySelectorAll('.breakfast-col');
            const lInputs = document.querySelectorAll('.lunch-col');
            const dInputs = document.querySelectorAll('.dinner-col');
            
            let tempDb = { breakfast: [], lunch: [], dinner: [] };
            
            bInputs.forEach(input => { if(input.value.trim()) tempDb.breakfast.push(input.value.trim()); });
            lInputs.forEach(input => { if(input.value.trim()) tempDb.lunch.push(input.value.trim()); });
            dInputs.forEach(input => { if(input.value.trim()) tempDb.dinner.push(input.value.trim()); });
            
            db = tempDb;
            localStorage.setItem(EXCEL_DB_KEY, JSON.stringify(db));
            alert("Spreadsheet grid layout modifications committed successfully!");
            excelToggleBtn.click();
        });

        document.getElementById('saveUnifiedBtn').addEventListener('click', () => {
            const bInput = document.getElementById('unified-breakfast');
            const lInput = document.getElementById('unified-lunch');
            const dInput = document.getElementById('unified-dinner');

            let added = false;
            if (bInput.value.trim()) { db.breakfast.push(bInput.value.trim()); bInput.value = ""; added = true; }
            if (lInput.value.trim()) { db.lunch.push(lInput.value.trim()); lInput.value = ""; added = true; }
            if (dInput.value.trim()) { db.dinner.push(dInput.value.trim()); dInput.value = ""; added = true; }

            if (added) {
                saveDatabase();
                status.innerText = "Meal inputs compiled and appended successfully!";
                status.style.color = "#34a853";
            } else {
                alert("Please add an item in at least one box before saving.");
            }
        });

        function renderSpreadsheetModal() {
            const container = document.getElementById('modalTableBody');
            container.innerHTML = "";

            ['breakfast', 'lunch', 'dinner'].forEach(category => {
                let rowsHtml = '';
                db[category].forEach((item, index) => {
                    rowsHtml += `
                        <div class="data-row">
                            <span class="data-cell">${item}</span>
                            <button class="btn-danger" onclick="deleteItem('${category}', ${index})">Delete</button>
                        </div>`;
                });

                container.insertAdjacentHTML('beforeend', `
                    <div class="table-section">
                        <h4>${category.toUpperCase()} (${db[category].length})</h4>
                        ${rowsHtml}
                    </div>`);
            });
        }

        window.deleteItem = function(cat, index) { db[cat].splice(index, 1); saveDatabase(); };

        document.getElementById('exportExcelBtn').addEventListener('click', function() {
            const maxLength = Math.max(db.breakfast.length, db.lunch.length, db.dinner.length);
            const sheetRows = [["Breakfast", "Lunch", "Dinner"]];
            for(let i=0; i<maxLength; i++) {
                sheetRows.push([db.breakfast[i] || "", db.lunch[i] || "", db.dinner[i] || ""]);
            }
            const worksheet = XLSX.utils.aoa_to_sheet(sheetRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Meals");
            XLSX.writeFile(workbook, "Meal_Sync_Database.xlsx");
        });

        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
