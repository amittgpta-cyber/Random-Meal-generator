<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1e1e1e;
            --md-sys-color-surface-variant: #2d2d2d;
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-on-primary: #062e6f;
            --md-sys-color-secondary: #c2e7ff;
            --md-sys-color-on-secondary: #003355;
            --md-sys-color-surprise: #ffb74d;
            --md-sys-color-on-surprise: #4e2600;
            --md-sys-color-fridge: #85e3b3;

            --md-sys-color-success: #34a853;

            filter: blur(40px);

.app-container {
    max-width: 440px;
    width: 100%;
    height: 100dvh;

    flex-direction: column;
}        
        header {
            display: flex;

width: 100%;
padding-top: 12px;
padding-bottom: max(12px, env(safe-area-inset-bottom));
background: var(--md-sys-color-background);

}        .meal-card {

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

</head>
<body>

    <div class="app-container">
        <header>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const EXCEL_DB_KEY = 'spreadsheetMealDatabase';
        const AI_HISTORY_KEY = 'mealSyncAIHistory';
        const AI_WEIGHTS_KEY = 'mealSyncAIWeights';
        
        const freshSeedData = {
            breakfast: ["Aalu Paratha", "Paneer Paratha", "Methi Paratha / Boondi Raita", "Guacamole toast (Avocado)", "Idli chutney / Sambhar", "Dosa Sambhar / chutney", "Veg Sandwich", "Paneer Sandwich", "Poha", "Vermicelli", "Sabudana khichdi", "Omelette", "Bun omelette", "Bun sandwich / Burger", "Moong daal cheela & chatni"],
            lunch: ["Methi Aalu / Moong Daal Roti", "Aalu / Kadhi Chawal", "Aalu Shimla mirch Roti", "Lauki Kofta Chawal", "Tindli / Moong Daal", "Kaddu Roti", "Soya Aalu Sabji Chawal", "Matar Aalu sabji Chawal / Roti", "Paneer Sabji Roti", "Parval Subji / Moong daal Roti", "Arhar daal / Toor Daal / Aalu Sabji / Roti / Chawal", "Lauki sabji Roti", "Rajma Chawal", "Chole Chawal", "Bhel", "Brown Daal / Roti / Chawal", "Udad daal Roti / Chawal", "Chana Daal / Lauki Chawal", "Mix Daal Roti", "Paneer Bhurji Roti", "Nutri Kulcha", "Kala chana chat / Roti", "Lobiya Chawal"],
            dinner: ["Egg Biryani", "Paneer Bhurji / chutney", "Noodles / Pasta", "Methi Aalu / Moong Daal Roti", "Aalu / Kadhi Chawal", "Aalu Shimla mirch Roti", "Lauki Kofta Chawal", "Tindli / Moong Daal", "Kaddu Roti", "Soya Aalu Sabji Chawal", "Matar Aalu sabji Chawal / Roti", "Paneer Sabji Roti", "Parval Subji / Moong daal Roti", "Arhar daal / Toor Daal / Aalu Sabji / Roti / Chawal", "Lauki sabji Roti", "Rajma Chawal", "Chole Chawal", "Egg curry rice", "Jeera Aalu Roti", "Khichdi dahi / Achar", "Daliya Veg", "Sattu Paratha"]
        };

        const surpriseMasterPool = {
            breakfast: ["Veg Upma", "Masala Scrambled Eggs with Toast", "Appam with Vegetable Stew", "Methi Thepla with Curd", "Egg Bhurji Roll", "Vegetable Dalia"],
            lunch: ["Paneer Bhurji with Tandoori Roti", "Chole Bhature with Pickle", "Veg Biryani with Raita", "Jeera Rice with Dal Makhani", "Aloo Shimla Mirch Curry", "Rajma Chawal"],
            dinner: ["Vegetable Khichdi with Papad", "Egg Curry with Steamed Rice", "Palak Paneer with Roti", "Baingan Bharta with Missi Roti", "Lauki Kofta Curry", "Pav Bhaji"]
        };

        let db = freshSeedData;
        if (localStorage.getItem(EXCEL_DB_KEY)) db = JSON.parse(localStorage.getItem(EXCEL_DB_KEY));
        else localStorage.setItem(EXCEL_DB_KEY, JSON.stringify(db));

        let aiHistory = JSON.parse(localStorage.getItem(AI_HISTORY_KEY)) || [];
        let aiWeights = JSON.parse(localStorage.getItem(AI_WEIGHTS_KEY)) || {};

        let currentSuggestionsState = [];
        let excelViewActive = false;
        
        const status = document.getElementById('uploadStatus');
        const dataModal = document.getElementById('dataModal');
        const fridgeModal = document.getElementById('fridgeModal');
        const modalTableBody = document.getElementById('modalTableBody');
        const modalExcelBody = document.getElementById('modalExcelBody');
        const modalToolbar = document.getElementById('modalToolbar');
        const excelToggleBtn = document.getElementById('excelToggleBtn');
        const modalTitle = document.getElementById('modalTitle');
        const excelGridTbody = document.getElementById('excelGridTbody');
        const actionConsole = document.getElementById('actionConsole');

        document.getElementById('fileUploadInput').addEventListener('change', handleFileRouting);
        document.getElementById('cameraCaptureInput').addEventListener('change', handleFileRouting);

        document.getElementById('fridgeBtn').addEventListener('click', () => { fridgeModal.style.display = "flex"; });
        document.getElementById('closeFridgeBtn').addEventListener('click', () => { fridgeModal.style.display = "none"; });
        document.getElementById('submitFridgeIngredientsBtn').addEventListener('click', runFridgeMatchingPipeline);

        function handleFileRouting(e) {
            const file = e.target.files[0];
            if (!file) return;
            const name = file.name.toLowerCase();
            status.style.color = "var(--md-sys-color-primary)";

            if (file.type.match('image.*')) {
                status.innerText = "Scanning Image via OCR Engine...";
                Tesseract.recognize(file, 'eng').then(({ data: { text } }) => { parseTextPool(text); });
            } else if (name.endsWith('.pdf')) {
                status.innerText = "Extracting raw PDF text lines...";
                processPDF(file);
            } else if (name.endsWith('.docx')) {
                status.innerText = "Extracting Word sequences...";
                processDocx(file);
            } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
                status.innerText = "Processing Excel Matrix...";
                processExcel(file);
            }
        }

        function processPDF(file) {
            const reader = new FileReader();
            reader.onload = function() {
                const arr = new Uint8Array(this.result);
                pdfjsLib.getDocument(arr).promise.then(pdf => {
                    let pages = [];
                    for(let i=1; i<=pdf.numPages; i++) {
                        pages.push(pdf.getPage(i).then(p => p.getTextContent().then(t => t.items.map(m => m.str).join(' '))));
                    }
                    Promise.all(pages).then(res => parseTextPool(res.join('\n')));
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function processDocx(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                mammoth.extractRawText({ arrayBuffer: e.target.result }).then(res => parseTextPool(res.value));
            };
            reader.readAsArrayBuffer(file);
        }

        function processExcel(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                if(json.length > 1) {
                    const headers = json[0].map(h => String(h).toLowerCase().trim());
                    const bIdx = headers.indexOf('breakfast');
                    const lIdx = headers.indexOf('lunch');
                    const dIdx = headers.indexOf('dinner');

                    for(let i = 1; i < json.length; i++) {
                        const row = json[i];
                        if(bIdx > -1 && row[bIdx]) db.breakfast.push(String(row[bIdx]).trim());
                        if(lIdx > -1 && row[lIdx]) db.lunch.push(String(row[lIdx]).trim());
                        if(dIdx > -1 && row[dIdx]) db.dinner.push(String(row[dIdx]).trim());
                    }
                    saveDatabase();
                    status.innerText = "Excel sheet merged perfectly!";
                    status.style.color = "#34a853";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function parseTextPool(text) {
            const chunks = text.replace(/[\r\\•]/g, '\n').split(/[\n,\;\•]|\s{3,}/).map(c => c.trim()).filter(c => c.length > 2);
            chunks.forEach(chunk => {
                const low = chunk.toLowerCase();
                if (low === 'breakfast' || low === 'lunch' || low === 'dinner') return;
                
                if (low.includes('breakfast') || low.includes('morning')) db.breakfast.push(chunk.replace(/breakfast/i,'').replace(/[:\-–—]/g,'').trim());
                else if (low.includes('lunch') || low.includes('afternoon')) db.lunch.push(chunk.replace(/lunch/i,'').replace(/[:\-–—]/g,'').trim());
                else if (low.includes('dinner') || low.includes('night')) db.dinner.push(chunk.replace(/dinner/i,'').replace(/[:\-–—]/g,'').trim());
                else {
                    const target = Math.min(db.breakfast.length, db.lunch.length, db.dinner.length);
                    if (db.breakfast.length === target) db.breakfast.push(chunk);
                    else if (db.lunch.length === target) db.lunch.push(chunk);
                    else db.dinner.push(chunk);
                }
            });
            saveDatabase();
            status.innerText = "Text data synchronized!";
            status.style.color = "#34a853";
        }

function saveDatabase() {

    db.breakfast =
        [...new Set(
            db.breakfast
                .map(x => String(x).trim())
                .filter(Boolean)
        )];

    db.lunch =
        [...new Set(
            db.lunch
                .map(x => String(x).trim())
                .filter(Boolean)
        )];

    db.dinner =
        [...new Set(
            db.dinner
                .map(x => String(x).trim())
                .filter(Boolean)
        )];

    localStorage.setItem(
        EXCEL_DB_KEY,
        JSON.stringify(db)
    );

    if (!excelViewActive)
        renderSpreadsheetModal();
}
        function getSmartAIMealSelection(categoryArr, timeOfDay) {
            if (!categoryArr.length) return "No meals added";
            const historicalExclusions = aiHistory.slice(-21).map(h => h.name.toLowerCase().trim());
            const availableOptions = categoryArr.filter(meal => !historicalExclusions.includes(meal.toLowerCase().trim()));
            const calculationPool = availableOptions.length ? availableOptions : categoryArr;

            let scores = calculationPool.map(meal => {
                let baseWeight = aiWeights[meal] || 1;
                return { name: meal, weight: baseWeight };
            });

            let totalWeight = scores.reduce((sum, s) => sum + s.weight, 0);
            let randomTarget = Math.random() * totalWeight;
            
            let runningSum = 0;
            for (let score of scores) {
                runningSum += score.weight;
                if (randomTarget <= runningSum) return score.name;
            }
            return calculationPool[Math.floor(Math.random() * calculationPool.length)];
        }

        function logSingleMealSelection(mealName, timeOfDay) {
            if (mealName === "No meals added") return;
            aiHistory.push({ time: timeOfDay, name: mealName });
            aiWeights[mealName] = (aiWeights[mealName] || 1) + 0.5;
            if (aiHistory.length > 42) aiHistory.shift();
            localStorage.setItem(AI_HISTORY_KEY, JSON.stringify(aiHistory));
            localStorage.setItem(AI_WEIGHTS_KEY, JSON.stringify(aiWeights));
        }

        function runFridgeMatchingPipeline() {
            const rawInput = document.getElementById('fridgeIngredientsInput').value.trim();
            if (!rawInput) return;

            const items = rawInput.toLowerCase().split(',').map(i => i.trim()).filter(i => i.length > 1);
            if (!items.length) return;

            fridgeModal.style.display = "none";

            const findBestPoolMatches = (sourcePool) => {
                return sourcePool.filter(meal => {
                    const lowerMeal = meal.toLowerCase();
                    return items.some(ingredient => lowerMeal.includes(ingredient));
                });
            };

            let bMatches = findBestPoolMatches(db.breakfast);
            let lMatches = findBestPoolMatches(db.lunch);
            let dMatches = findBestPoolMatches(db.dinner);

            let surpriseUsedB = false, surpriseUsedL = false, surpriseUsedD = false;
            
            if (!bMatches.length) { bMatches = findBestPoolMatches(surpriseMasterPool.breakfast); surpriseUsedB = true; }
            if (!lMatches.length) { lMatches = findBestPoolMatches(surpriseMasterPool.lunch); surpriseUsedL = true; }
            if (!dMatches.length) { dMatches = findBestPoolMatches(surpriseMasterPool.dinner); surpriseUsedD = true; }

            const pickFinalResult = (matchPool, fallbackSource) => {
                return matchPool.length ? matchPool[Math.floor(Math.random() * matchPool.length)] : fallbackSource[Math.floor(Math.random() * fallbackSource.length)];
            };

            renderOutputDeck([
                { time: `Breakfast ${surpriseUsedB && bMatches.length ? '(Surprise)' : '(Fridge)'}`, name: pickFinalResult(bMatches, db.breakfast), isSurprise: surpriseUsedB, isLocked: false },
                { time: `Lunch ${surpriseUsedL && lMatches.length ? '(Surprise)' : '(Fridge)'}`, name: pickFinalResult(lMatches, db.lunch), isSurprise: surpriseUsedL, isLocked: false },
                { time: `Dinner ${surpriseUsedD && dMatches.length ? '(Surprise)' : '(Fridge)'}`, name: pickFinalResult(dMatches, db.dinner), isSurprise: surpriseUsedD, isLocked: false }
            ]);
        }

        function renderOutputDeck(schema) {

            currentSuggestionsState.forEach((s, index) => {

                            ${s.isSurprise ? '' : '<span class="ai-badge">AI Optimized</span>'}
                        </div>
                        <!-- Layout row button mapping components modified to invert alignment positions -->

    <button class="action-bar-btn btn-action-lock"
        onclick="lockChoiceIntoExclusionMemory(event, ${index})">

<button class="action-bar-btn"
onclick="event.stopPropagation();openRecipeModal('${s.name.replace(/'/g, "\\'")}')">
📖 Find Recipe
</button>

        window.lockChoiceIntoExclusionMemory = function(event, index) {
            event.stopPropagation(); 
            const cardState = currentSuggestionsState[index];
            const cardElement = document.getElementById('suggestion-card-' + index);
            if (cardState.isLocked) return; 

            logSingleMealSelection(cardState.name, cardState.time.split(' ')[0]);
            cardState.isLocked = true;
            cardElement.classList.add('locked-state');
            
            const lockBtn = cardElement.querySelector('.btn-action-lock');
            if (lockBtn) lockBtn.innerText = 'Confirmed';
        };

        window.refreshSpecificCategoryCard = function(event, index) {
            event.stopPropagation(); 
            const cardState = currentSuggestionsState[index];
            if (cardState.isLocked) return; 

            const cleanCategoryKey = cardState.time.split(' ')[0].toLowerCase(); 
            let newMealName = "No meals added";

            if (cardState.isSurprise || cardState.time.includes('Surprise')) {
                const filterSurprise = (pool, userDb) => {
                    const normalizedDb = userDb.map(i => i.toLowerCase().trim());
                    return pool.filter(i => !normalizedDb.includes(i.toLowerCase().trim()));
                };
                const surprisePool = filterSurprise(surpriseMasterPool[cleanCategoryKey], db[cleanCategoryKey]);
                if (surprisePool.length) newMealName = surprisePool[Math.floor(Math.random() * surprisePool.length)];
            } else {
                newMealName = getSmartAIMealSelection(db[cleanCategoryKey], cleanCategoryKey.charAt(0).toUpperCase() + cleanCategoryKey.slice(1));
            }

            cardState.name = newMealName;
            const textEl = document.getElementById(`suggestion-name-text-${index}`);
            if (textEl) textEl.innerText = newMealName;
        };

        window.enableInlineCardEditing = function(index) {
            const cardState = currentSuggestionsState[index];
            if (cardState.isLocked) return; 

            const detailsBox = document.getElementById(`suggestion-details-${index}`);
            const textEl = document.getElementById(`suggestion-name-text-${index}`);
            if (document.getElementById(`inline-input-field-${index}`)) return;

            const originalValue = textEl.innerText;
            textEl.style.display = "none";
            
            detailsBox.insertAdjacentHTML('beforeend', `
                <div id="inline-edit-wrap-${index}" onclick="event.stopPropagation();" style="width:100%; display:flex; flex-direction:column;">
                    <input type="text" id="inline-input-field-${index}" class="inline-edit-input" value="${originalValue}">
                    <button class="inline-save-btn" onclick="commitInlineCardUpdate(${index}, '${cardState.time.split(' ')[0].toLowerCase()}', '${originalValue}')">SAVE</button>
                </div>
            `);
            document.getElementById(`inline-input-field-${index}`).focus();
        };

        window.commitInlineCardUpdate = function(index, category, oldValue) {
            const inputField = document.getElementById(`inline-input-field-${index}`);
            const newValue = inputField.value.trim();

            if (newValue && newValue !== oldValue) {
                const dbIndex = db[category].indexOf(oldValue);
                if (dbIndex !== -1) db[category][dbIndex] = newValue;
                else db[category].push(newValue);
                localStorage.setItem(EXCEL_DB_KEY, JSON.stringify(db));
                currentSuggestionsState[index].name = newValue;
            }

            if (document.getElementById(`inline-edit-wrap-${index}`)) document.getElementById(`inline-edit-wrap-${index}`).remove();
            const textElement = document.getElementById(`suggestion-name-text-${index}`);
            textElement.innerText = newValue || oldValue;
            textElement.style.display = "block";
        };

            const bInput = document.getElementById('unified-breakfast');

        });
