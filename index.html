<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Meal Sync Pro</title>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root, [data-theme="light"] {
      --color-bg:#f7f6f2; --color-surface:#f9f8f5; --color-surface-2:#fbfbf9; --color-surface-offset:#f3f0ec; --color-border:#d4d1ca; --color-divider:#dcd9d5;
      --color-text:#28251d; --color-text-muted:#7a7974; --color-primary:#01696f; --color-secondary:#e8af34; --color-success:#437a22; --color-warning:#da7101; --color-error:#a12c7b;
      --radius-btn: 0.5rem;
    }
    [data-theme="dark"] {
      --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d; --color-text:#cdccca; --color-text-muted:#9a9996; --color-primary:#4f98a3;
    }
    body { font-family: 'General Sans', sans-serif; background-color: var(--color-bg); color: var(--color-text); margin: 0; padding: 2rem; }
    .shell { width: min(100%, 70rem); margin: 0 auto; }
    .topbar { display:flex; justify-content:space-between; margin-bottom:2rem; }
    .stat { background: var(--color-surface-2); padding: 1rem; border-radius: var(--radius-btn); border: 1px solid var(--color-divider); text-align: center; flex: 1; }
    .stats { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .meal-card { background: var(--color-surface); padding: 1.5rem; border-radius: 1.5rem; border: 1px solid var(--color-divider); margin-bottom: 2rem; }
    .meal-title { font-family: 'Boska'; font-size: 2rem; margin: 0.5rem 0; }
    .nav-buttons-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    .card-action { padding: 1rem; border-radius: var(--radius-btn); background: var(--color-surface-offset); border: 1px solid var(--color-divider); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .card-action.added { background: #10b981 !important; color: white; }
    .tag-veg { background: rgba(67, 122, 34, 0.2); color: #437a22; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    .tag-egg { background: rgba(232, 175, 52, 0.2); color: #b45309; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    .tag-nonveg { background: rgba(161, 44, 123, 0.2); color: #a12c7b; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
    .modal.open { display:flex; }
    .dialog { background: var(--color-surface); width: min(95%, 600px); border-radius: 1rem; padding: 2rem; max-height: 80vh; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar"><h1>Meal Sync Pro</h1><button id="openDataBtn">CookBook</button></header>
    <div class="stats"><article class="stat"><span class="subtle">B</span><strong id="countBreakfast">0</strong></article><article class="stat"><span class="subtle">L</span><strong id="countLunch">0</strong></article><article class="stat"><span class="subtle">D</span><strong id="countDinner">0</strong></article></div>
    <div id="suggestions"></div>
  </div>
  
  <div id="dataModal" class="modal">
    <div class="dialog">
      <h2>CookBook</h2>
      <div id="reviewQueuePanel" style="display:none; background:var(--color-surface-2); padding:1rem; border-radius:0.5rem; margin:1rem 0;">
        <h5>Pending Queue</h5>
        <ul id="reviewQueueList"></ul>
        <button id="submitApprovalBtn" class="primary-btn" style="margin-top:1rem;">Send for Approval</button>
      </div>
      <div id="tableSections"></div>
      <button id="closeDataBtn">Close</button>
    </div>
  </div>

  <script>
    const GOOGLE_SHEETS_API_URL = "YOUR_URL_HERE";
    const state = { db: { breakfast: [], lunch: [], dinner: [] }, currentSuggestions: [] };
    let pendingApprovals = [];

    // Tag Logic: Dynamically decide based on name
    function getMealTag(name) {
      const low = name.toLowerCase();
      if (['chicken','fish','meat','prawn'].some(k => low.includes(k))) return { text: 'Non-Veg', cls: 'tag-nonveg' };
      if (['egg','omelette'].some(k => low.includes(k))) return { text: 'Egg', cls: 'tag-egg' };
      return { text: 'Veg', cls: 'tag-veg' };
    }

    function renderOutputDeck(schema) {
      state.currentSuggestions = schema;
      const container = document.getElementById('suggestions');
      container.innerHTML = '';
      schema.forEach((item, index) => {
        const tag = getMealTag(item.name);
        const div = document.createElement('div');
        div.className = 'meal-card';
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between;">
             <span class="badge ${tag.cls}">${tag.text}</span>
             <button data-action="save" data-index="${index}">Add to Cookbook</button>
          </div>
          <div class="meal-title">${item.name}</div>
          <div class="nav-buttons-row">
            <button class="card-action" data-action="prev" data-index="${index}">Prev</button>
            <button class="card-action" data-action="next" data-index="${index}">Next</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Logic to queue and avoid duplicates
    function queueMeal(category, mealName) {
      if (state.db[category].includes(mealName) || pendingApprovals.some(a => a.meal === mealName)) return;
      pendingApprovals.push({ category, meal: mealName });
      renderReviewQueue();
    }

    // ... (Add your event listeners here to link the buttons to queueMeal) ...
  </script>
</body>
</html>
