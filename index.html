<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Sync Pro</title>
    
    <style>
        :root { --md-sys-color-background: #121212; --md-sys-color-primary: #a8c7fa; --md-sys-color-success: #34a853; --md-sys-color-text: #e3e2e6; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--md-sys-color-background); color: var(--md-sys-color-text); margin: 0; padding: 20px; min-height: 100vh; }
        .app-container { max-width: 440px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }
        .btn { border: none; padding: 18px; border-radius: 100px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .meal-card { background: #1e1e1e; border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        .meal-name { font-size: 20px; font-weight: 500; margin: 10px 0; }
        .card-actions { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Meal Sync Pro</h1>
        <main id="suggestions"></main>
        <div id="console">
            <button id="fridgeBtn" class="btn" style="background:#85e3b3; color:#000">🥦 Fridge Items</button>
            <button id="surpriseBtn" class="btn" style="background:#ffb74d; color:#000">✨ Surprise ME!</button>
            <button id="generateBtn" class="btn" style="background:#c2e7ff; color:#000">🍽️ What to EAT Today?</button>
        </div>
    </div>

    <script>
        // Full database integrated from your Excel file
        const db = { 
            breakfast: ["Poha", "Aalu Paratha", "Paneer Paratha", "Idli", "Dosa", "Veg Sandwich", "Upma", "Dalia"], 
            lunch: ["Dal Rice", "Rajma Chawal", "Paneer Sabji Roti", "Lauki Kofta", "Kadhi Chawal", "Soya Aalu Sabji", "Matar Aalu", "Parval Subji", "Arhar Dal", "Lauki Sabji", "Udad Dal", "Chana Dal"], 
            dinner: ["Khichdi", "Egg Biryani", "Noodles", "Palak Paneer", "Paneer Bhurji", "Egg Curry", "Jeera Aalu", "Sattu Paratha", "Pasta", "Pav Bhaji"] 
        };
        
        let indices = { breakfast: 0, lunch: 0, dinner: 0 };

        document.body.addEventListener('click', (e) => {
            const target = e.target;
            
            if (target.id === 'generateBtn') renderMeals(true);
            if (target.id === 'fridgeBtn') alert("Fridge Matching: Checking your pantry ingredients...");
            if (target.id === 'surpriseBtn') alert("Surprise Mode: Picking a random meal from your database!");
            
            if (target.classList.contains('btn-change')) {
                const cat = target.dataset.cat;
                const idx = target.dataset.index;
                indices[cat] = (indices[cat] + 1) % db[cat].length;
                document.querySelectorAll('.meal-name')[idx].innerText = db[cat][indices[cat]];
            }
            
            if (target.classList.contains('btn-lock')) {
                target.innerText = "Confirmed!"; target.style.background = "#555";
            }
            
            if (target.classList.contains('btn-recipe')) {
                window.open(`https://google.com/search?q=${target.dataset.meal}+recipe`, "_blank");
            }
        });

        function renderMeals(reset) {
            const out = document.getElementById('suggestions');
            out.innerHTML = "";
            ['breakfast', 'lunch', 'dinner'].forEach((cat, index) => {
                if(reset) indices[cat] = 0;
                const meal = db[cat][indices[cat]];
                out.insertAdjacentHTML('beforeend', `
                    <div class="meal-card">
                        <small style="color:var(--md-sys-color-primary)">${cat.toUpperCase()}</small>
                        <div class="meal-name">${meal}</div>
                        <div class="card-actions">
                            <button class="action-btn btn-lock" style="background:var(--md-sys-color-success);color:white">✅ Eat</button>
                            <button class="action-btn btn-change" style="background:#333;color:white" data-cat="${cat}" data-index="${index}">🔄 Change</button>
                            <button class="action-btn btn-recipe" style="background:var(--md-sys-color-primary)" data-meal="${meal}">📖 Recipe</button>
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
