<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Sync Pro</title>
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json,{'name':'Meal Sync Pro','short_name':'MealSync','start_url':'./index.html','display':'fullscreen','background_color':'#121212','theme_color':'#121212','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/2276/2276931.png','sizes':'512x512','type':'image/png','purpose':'any maskable'}]}" />
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1e1e1e;
            --md-sys-color-surface-variant: #2d2d2d;
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-secondary: #c2e7ff;
            --md-sys-color-surprise: #ffb74d;
            --md-sys-color-fridge: #85e3b3;
            --md-sys-color-success: #34a853;
            --md-sys-color-text: #e3e2e6;
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--md-sys-color-background); color: var(--md-sys-color-text); margin: 0; padding: 25px; min-height: 100vh; }
        .app-container { max-width: 440px; margin: 0 auto; width: 100%; }
        h1 { font-size: 2.2rem; margin-bottom: 25px; text-align: center; }
        
        .btn { border: none; padding: 20px 30px; border-radius: 100px; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin: 0 auto 15px auto; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .bottom-action-console { position: fixed; bottom: 30px; left: 5%; width: 90%; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .shrink-mode .btn { padding: 12px 16px; font-size: 14px; }
        
        .meal-card { background: var(--md-sys-color-surface-variant); border-radius: 28px; padding: 25px; margin-bottom: 25px; }
        .meal-name { font-size: 22px; font-weight: 500; margin-top: 5px; color: var(--md-sys-color-text); }
        .card-explicit-actions-bar { display: flex; gap: 15px; margin-top: 20px; }
        .action-bar-btn { flex: 1; padding: 16px; border-radius: 50px; border: none; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .btn-action-lock { background: var(--md-sys-color-success); color: white; }
        .btn-action-change { background: #333; color: white; }
    </style>
</head>
<body>

    <div class="app-container">
        <header><h1>Meal Sync Pro</h1></header>
        <main id="suggestions" class="suggestion-list"></main>
        <div id="actionConsole" class="bottom-action-console">
            <button id="fridgeBtn" class="btn" style="background:var(--md-sys-color-fridge); color:#000">🥦 Fridge Items</button>
            <button id="surpriseBtn" class="btn" style="background:var(--md-sys-color-surprise); color:#000">✨ Surprise ME!</button>
            <button id="generateBtn" class="btn" style="background:var(--md-sys-color-secondary); color:#000">🍽️ What to EAT Today?</button>
        </div>
    </div>

    <script>
        const db = JSON.parse(localStorage.getItem('mealDb')) || { breakfast: ["Poha"], lunch: ["Dal Rice"], dinner: ["Khichdi"] };
        
        function applyLayout(isResults) {
            const console = document.getElementById('actionConsole');
            if(isResults) console.classList.add('shrink-mode');
            else console.classList.remove('shrink-mode');
        }

        function renderOutputDeck(schema) {
            const out = document.getElementById('suggestions');
            out.innerHTML = "";
            applyLayout(true);
            schema.forEach((s, index) => {
                out.insertAdjacentHTML('beforeend', `
                    <div class="meal-card">
                        <span style="font-size: 12px; color: var(--md-sys-color-primary);">${s.time}</span>
                        <div class="meal-name">${s.name}</div>
                        <div class="card-explicit-actions-bar">
                            <button class="action-bar-btn btn-action-lock" onclick="confirm(this)">✅ I'll EAT IT</button>
                            <button class="action-bar-btn btn-action-change" onclick="refresh(${index}, '${s.time.toLowerCase()}')">🔄 Change</button>
                        </div>
                    </div>
                `);
            });
        }

        function refresh(index, cat) {
            const el = document.querySelectorAll('.meal-name')[index];
            el.innerText = db[cat.split(' ')[0]][Math.floor(Math.random() * db[cat.split(' ')[0]].length)];
        }

        function confirm(btn) {
            btn.innerText = "Confirmed!";
            btn.style.background = "#555";
        }

        document.getElementById('generateBtn').addEventListener('click', () => {
            renderOutputDeck([
                { time: "Breakfast", name: db.breakfast[0] },
                { time: "Lunch", name: db.lunch[0] },
                { time: "Dinner", name: db.dinner[0] }
            ]);
        });
    </script>
</body>
</html>
