<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Sync Pro</title>
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface-variant: #2d2d2d;
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-secondary: #c2e7ff;
            --md-sys-color-surprise: #ffb74d;
            --md-sys-color-fridge: #85e3b3;
            --md-sys-color-success: #34a853;
            --md-sys-color-text: #e3e2e6;
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--md-sys-color-background); color: var(--md-sys-color-text); margin: 0; padding: 20px; min-height: 100vh; }
        .app-container { max-width: 440px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; min-height: 100vh; }
        
        h1 { font-size: 2.2rem; text-align: center; margin-bottom: 25px; }
        .btn { border: none; padding: 18px; border-radius: 100px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .suggestion-list { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .meal-card { background: var(--md-sys-color-surface-variant); border-radius: 24px; padding: 20px; }
        .meal-name { font-size: 20px; font-weight: 500; margin: 5px 0 15px 0; }
        
        .card-explicit-actions-bar { display: flex; gap: 10px; }
        .action-bar-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        
        .btn-action-change { background: #333; color: white; }
        .btn-action-lock { background: var(--md-sys-color-success); color: white; }
        .btn-action-recipe { background: var(--md-sys-color-primary); color: #000; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Meal Sync Pro</h1>
        <main id="suggestions" class="suggestion-list"></main>
        
        <div class="console">
            <button id="fridgeBtn" class="btn" style="background:var(--md-sys-color-fridge); color:#000">🥦 Fridge Items</button>
            <button id="surpriseBtn" class="btn" style="background:var(--md-sys-color-surprise); color:#000">✨ Surprise ME!</button>
            <button id="generateBtn" class="btn" style="background:var(--md-sys-color-secondary); color:#000">🍽️ What to EAT Today?</button>
        </div>
    </div>

    <script>
        // Restored Hardcoded Database (including file data)
        const db = { 
            breakfast: ["Poha", "Aalu Paratha", "Paneer Paratha", "Idli", "Dosa", "Veg Sandwich"], 
            lunch: ["Dal Rice", "Rajma Chawal", "Paneer Sabji Roti", "Lauki Kofta", "Kadhi Chawal"], 
            dinner: ["Khichdi", "Egg Biryani", "Noodles", "Palak Paneer", "Paneer Bhurji"] 
        };
        
        document.body.addEventListener('click', (e) => {
            const target = e.target;
            if (target.id === 'generateBtn') renderMeals();
            if (target.classList.contains('btn-change')) {
                const cat = target.dataset.cat;
                const idx = target.dataset.index;
                const el = document.querySelectorAll('.meal-name')[idx];
                el.innerText = db[cat][Math.floor(Math.random() * db[cat].length)];
            }
            if (target.classList.contains('btn-lock')) {
                target.innerText = "Confirmed!"; target.style.background = "#555";
            }
            if (target.classList.contains('btn-recipe')) {
                window.open(`https://google.com/search?q=${target.dataset.meal}+recipe`, "_blank");
            }
        });

        function renderMeals() {
            const out = document.getElementById('suggestions');
            out.innerHTML = "";
            ['breakfast', 'lunch', 'dinner'].forEach((cat, index) => {
                const meal = db[cat][0];
                out.insertAdjacentHTML('beforeend', `
                    <div class="meal-card">
                        <small style="color:var(--md-sys-color-primary)">${cat.toUpperCase()}</small>
                        <div class="meal-name">${meal}</div>
                        <div class="card-explicit-actions-bar">
                            <button class="action-bar-btn btn-lock">✅ Eat</button>
                            <button class="action-bar-btn btn-change" data-cat="${cat}" data-index="${index}">🔄 Change</button>
                            <button class="action-bar-btn btn-recipe" data-meal="${meal}">📖 Recipe</button>
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
