<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Sync Pro</title>
    <style>
        :root { --md-sys-color-background: #121212; --md-sys-color-primary: #a8c7fa; --md-sys-color-success: #34a853; --md-sys-color-text: #e3e2e6; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--md-sys-color-background); color: var(--md-sys-color-text); margin: 0; padding: 20px; min-height: 100vh; }
        .app-container { max-width: 440px; margin: 0 auto; width: 100%; }
        .btn { border: none; padding: 18px; border-radius: 100px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .meal-card { background: #1e1e1e; border-radius: 24px; padding: 20px; margin-bottom: 20px; transition: border 0.3s; }
        .locked-state { border: 2px solid var(--md-sys-color-success); background: #263229; }
        .meal-name { font-size: 20px; font-weight: 500; margin: 10px 0; }
        .card-actions { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Meal Sync Pro</h1>
        <main id="suggestions"></main>
        <div>
            <button id="surpriseBtn" class="btn" style="background:#ffb74d;">✨ Surprise ME!</button>
            <button id="generateBtn" class="btn" style="background:#c2e7ff;">🍽️ What to EAT Today?</button>
        </div>
    </div>

    <script>
        // HARDCODED DATABASE - Paste your Excel file contents here
        const db = { 
            breakfast: ["Aalu Paratha", "Poha", "Paneer Paratha", "Upma", "Dalia", "Idli", "Sandwich"], 
            lunch: ["Dal Rice", "Rajma Chawal", "Paneer Sabji", "Lauki Kofta", "Kadhi Chawal", "Arhar Dal"], 
            dinner: ["Khichdi", "Egg Biryani", "Noodles", "Palak Paneer", "Paneer Bhurji", "Pav Bhaji"] 
        };

        let currentSelection = []; 

        async function fetchSurpriseMeal() {
            try {
                const res = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
                const data = await res.json();
                return data.meals[0].strMeal;
            } catch { return "Surprise Dish"; }
        }

        document.body.addEventListener('click', async (e) => {
            const target = e.target;
            
            if (target.id === 'generateBtn') {
                currentSelection = ['breakfast', 'lunch', 'dinner'].map(cat => ({
                    cat, name: db[cat][Math.floor(Math.random() * db[cat].length)], locked: false
                }));
                renderMeals();
            }

            if (target.id === 'surpriseBtn') {
                for (let item of currentSelection) {
                    if (!item.locked) item.name = await fetchSurpriseMeal();
                }
                renderMeals();
            }

            if (target.classList.contains('btn-change')) {
                const idx = target.dataset.index;
                if (!currentSelection[idx].locked) {
                    currentSelection[idx].name = db[currentSelection[idx].cat][Math.floor(Math.random() * db[currentSelection[idx].cat].length)];
                    renderMeals();
                }
            }

            if (target.classList.contains('btn-lock')) {
                const idx = target.dataset.index;
                currentSelection[idx].locked = !currentSelection[idx].locked;
                renderMeals();
            }
        });

        function renderMeals() {
            const out = document.getElementById('suggestions');
            out.innerHTML = "";
            currentSelection.forEach((s, index) => {
                out.insertAdjacentHTML('beforeend', `
                    <div class="meal-card ${s.locked ? 'locked-state' : ''}">
                        <small>${s.cat.toUpperCase()}</small>
                        <div class="meal-name">${s.name}</div>
                        <div class="card-actions">
                            <button class="action-btn btn-lock" data-index="${index}" style="background:${s.locked ? '#34a853' : '#555'}; color:white">
                                ${s.locked ? '✅ Confirmed' : '✅ I\'ll EAT IT'}
                            </button>
                            <button class="action-btn btn-change" data-index="${index}" style="background:#333; color:white; ${s.locked ? 'opacity:0.3;' : ''}">🔄 Change</button>
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
