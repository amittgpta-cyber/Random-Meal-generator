
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Meal Sync Pro</title>
  <meta name="theme-color" content="#171614" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root, [data-theme="light"] {
      --color-bg:#f7f6f2; --color-surface:#f9f8f5; --color-surface-2:#fbfbf9; --color-surface-offset:#f3f0ec;
      --color-divider:#dcd9d5; --color-text:#28251d; --color-text-muted:#7a7974; 
      --color-primary:#01696f; --color-secondary:#e8af34; --color-success:#437a22; --color-warning:#da7101; --color-error:#a12c7b;
      --radius-btn: 0.5rem; --radius-xl: 1rem; --radius-2xl: 1.5rem;
      --shadow-sm:0 1px 2px oklch(0.2 0.01 80 / 0.06); --shadow-md:0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --font-body:'General Sans', Inter, sans-serif; --font-display:'Boska', Georgia, serif;
    }
    [data-theme="dark"] {
      --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d; --color-surface-offset:#22211f; 
      --color-border:#393836; --color-divider:#262523; --color-text:#cdccca; --color-text-muted:#9a9996; 
      --color-primary:#4f98a3; --shadow-sm:0 1px 2px oklch(0 0 0 / 0.2); --shadow-md:0 4px 12px oklch(0 0 0 / 0.3);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{min-height:100dvh;font-family:var(--font-body);font-size:1rem;line-height:1.6;background:radial-gradient(circle at top, color-mix(in oklab, var(--color-primary) 10%, transparent), transparent 35%), var(--color-bg);color:var(--color-text)}
    button,input{font:inherit;color:inherit}
    button{cursor:pointer;border:none;background:none}
    
    .shell{width:min(100% - 2rem, 70rem);margin:0 auto;padding:clamp(1rem,4vw,2rem) 1rem calc(20rem + env(safe-area-inset-bottom))}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem}
    .brand{display:flex;align-items:center;gap:0.75rem}
    .brand-logo{width:2.5rem;height:2.5rem;border-radius:0.75rem;display:grid;place-items:center;background:linear-gradient(135deg,var(--color-primary),color-mix(in oklab, var(--color-primary) 40%, var(--color-secondary)));color:#fff;box-shadow:var(--shadow-md)}
    h1{font-family:var(--font-display);font-size:1.5rem;font-weight:500;line-height:1}
    .subtle{color:var(--color-text-muted);font-size:0.875rem}
    .header-actions{display:flex;gap:0.5rem;align-items:center}
    
    .icon-btn,.ghost-btn,.primary-btn,.accent-btn,.success-btn{min-height:50px;border-radius:var(--radius-btn);transition:all 0.1s ease; display:flex; align-items:center; justify-content:center; gap:8px;}
    .icon-btn{width:50px;border:1px solid color-mix(in oklab,var(--color-text) 12%, transparent);background:var(--color-surface)}
    .primary-btn,.accent-btn,.success-btn,.ghost-btn{padding:0.75rem 1.2rem;font-weight:600; text-align: center;}
    .ghost-btn{background:var(--color-surface);border:1px solid color-mix(in oklab,var(--color-text) 12%, transparent)}
    .primary-btn{background:var(--color-primary);color:#fff}
    .accent-btn{background:var(--color-secondary);color:#1a1406}
    .success-btn{background:var(--color-success);color:#fff}
    
    .hero{margin-bottom:1.5rem}
    .hero-grid{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:0.75rem}
    .hero h2{font-family:var(--font-display);font-size:2rem;line-height:1;font-weight:500;margin:0;}
    
    .stats{display:flex; flex-direction:row; gap:0.5rem; overflow-x:auto; padding-bottom:4px;}
    .stat{flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:0.6rem; background:var(--color-surface-2); border-radius:var(--radius-btn); border:1px solid color-mix(in oklab,var(--color-text) 8%, transparent); white-space:nowrap;}
    .stat strong{font-size:1rem; margin:0;}
    .stat .subtle{font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em; margin:0;}
    
    .section{margin-bottom:2rem}
    .cards{display:grid;gap:1.5rem}
    
    .meal-card{background:var(--color-surface);border:1px solid color-mix(in oklab,var(--color-text) 9%, transparent);border-radius:1.75rem;overflow:hidden;box-shadow:var(--shadow-sm); transition: border-color 0.1s ease; display:flex; flex-direction:column;}
    .meal-card.locked{border-color:#10b981;box-shadow:0 0 0 2px #10b981;}
    .meal-main{padding:1.25rem;display:grid;gap:0.5rem; grid-template-rows: auto auto auto 1fr;}

    
    .card-header-row{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.25rem;}
    .card-header-left {display:flex; flex-direction:column; gap:4px;}
    .card-header-right {display:flex; align-items:center; gap:8px;}
    .eyebrow{font-size:0.875rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-muted);font-weight:700}
    
    .badge{padding:.3rem .6rem;border-radius:var(--radius-btn);font-size:0.75rem;font-weight:700; white-space:nowrap; display:inline-block;}
    .tag-veg { background: color-mix(in oklab, var(--color-success) 18%, transparent); color: var(--color-success); }
    .tag-egg { background: color-mix(in oklab, var(--color-secondary) 25%, transparent); color: #d97706; }
    .tag-nonveg { background: color-mix(in oklab, var(--color-error) 18%, transparent); color: var(--color-error); }
    .badge.warning{background:color-mix(in oklab,var(--color-warning) 20%, transparent);color:var(--color-warning)}
    
    .badge-btn {cursor: pointer; padding: 0.4rem 0.8rem; border-radius: var(--radius-btn); font-weight: bold; background: var(--color-surface-offset); color: var(--color-text); border: 1px solid color-mix(in oklab,var(--color-text) 15%, transparent); font-size: 0.875rem; display: flex; align-items: center; gap: 6px; transition: all 0.1s;}
    .badge-btn:active {transform: scale(0.96);}
    .badge-btn.added { background: #10b981 !important; color: #fff !important; border-color: #10b981 !important; }
    
.meal-title{font-size:clamp(1.6rem, 5vw, 2.4rem);line-height:1.15; font-family:var(--font-display); font-weight:700; margin-top:4px; color:var(--color-text); letter-spacing:-0.01em;}

    
    .nav-buttons-row {display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: auto; margin-bottom: 0.5rem;}

    
    .card-action{min-height:50px;font-weight:700;font-size:1rem;border:1px solid color-mix(in oklab,var(--color-text) 12%, transparent);border-radius:var(--radius-btn);background:linear-gradient(180deg,color-mix(in oklab,var(--color-surface) 72%, white 8%),var(--color-surface-2));box-shadow:0 1px 0 rgba(255,255,255,.03) inset; cursor:pointer; transition: all 0.1s; display:flex; align-items:center; justify-content:center; gap:8px; padding: 0.5rem 1rem;}
    .card-action:disabled{opacity:0.4;cursor:not-allowed;}
    .card-action.locked { background: #10b981 !important; color: #fff !important; border: 1px solid #10b981 !important; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3) !important; }
    
    .main-actions-row {display:grid; grid-template-columns: 1fr 1fr; gap:0.75rem; padding:0 1.25rem 1.25rem;}
    .explore-area {display:none; grid-template-columns: 1fr 1fr; gap: 0.75rem; padding: 0 1.25rem 1.25rem; border-top: 1px solid color-mix(in oklab,var(--color-text) 8%, transparent); margin-top: -0.5rem; padding-top: 1rem;}
    
    .empty{padding:2rem;text-align:left;background:var(--color-surface);border-radius:var(--radius-2xl);border:1px dashed color-mix(in oklab,var(--color-text) 16%, transparent);color:var(--color-text-muted); font-size: 1.125rem;}
    .empty h3 {color: var(--color-text); margin-bottom: 0.5rem; font-family: var(--font-display); font-size: 1.5rem; line-height:1.2;}
    
    .bottom-console{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,70rem);padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--color-bg) 70%,color-mix(in oklab,var(--color-bg) 82%, transparent));backdrop-filter:blur(10px);z-index:20}
    .console-grid{display:grid; grid-template-columns: repeat(3, 1fr); gap:0.75rem}
    .console-grid button{width:100%;box-shadow:var(--shadow-md); justify-content:center;}
    
    .modal{position:fixed;inset:0;background:color-mix(in oklab,#000 65%, transparent);display:none;align-items:center;justify-content:center;padding:1rem;z-index:50; backdrop-filter:blur(4px);}
    .modal.open{display:flex}
    .dialog{width:min(100%,64rem);max-height:min(90dvh,56rem);overflow:hidden;background:var(--color-surface);border:1px solid color-mix(in oklab,var(--color-text) 10%, transparent);border-radius:2rem;box-shadow:var(--shadow-lg);display:flex;flex-direction:column}
    .dialog.small{width:min(100%,36rem);max-height:min(80dvh,34rem)}
    .dialog-head{padding:1.25rem; display:flex;justify-content:space-between;align-items:center;gap:1rem;border-bottom:1px solid var(--color-divider);flex-shrink:0; background:var(--color-surface);}
    .dialog-head h4{font-size:1.5rem;font-family:var(--font-display);font-weight:500; display:flex; align-items:center; gap:8px; margin:0;}
    
    .dialog-content-scroll { overflow-y:auto; flex-grow:1; display:flex; flex-direction:column; padding-bottom:2rem;}
    
    .dialog-tools{padding:1rem 1.25rem;display:grid;gap:1rem;border-bottom:1px solid var(--color-divider)}
    .import-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0.5rem}
    .import-label{display:grid;place-items:center;gap:0.25rem;padding:0.75rem;text-align:center;background:var(--color-surface-2);border:1px dashed color-mix(in oklab,var(--color-text) 12%, transparent);border-radius:var(--radius-btn);cursor:pointer;font-size:0.875rem}
    .hidden{display:none!important}
    .toolbar-row{display:flex;gap:0.75rem;flex-wrap:wrap}
    .status{font-size:0.875rem;color:var(--color-primary);min-height:1.5em;white-space:pre-wrap}
    .dialog-body{padding:1.25rem;display:grid;gap:1.5rem}
    .panel{padding:1.25rem;background:var(--color-surface-2);border-radius:var(--radius-2xl);border:1px solid color-mix(in oklab,var(--color-text) 8%, transparent)}
    .panel h5{font-size:0.875rem;text-transform:uppercase;letter-spacing:.08em;color:var(--color-primary);margin-bottom:1rem}
    .stack{display:grid;gap:0.75rem}
    
    .review-queue-list {list-style:none; padding:0; margin:0; display:grid; gap:8px;}
    .review-queue-item {display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--color-surface); border:1px solid var(--color-divider); border-radius:var(--radius-btn); font-size:0.875rem;}
    .review-queue-remove {color:var(--color-error); background:none; border:none; cursor:pointer; font-weight:bold; font-size:1.2rem; padding:0 8px;}
    
    .input {width:100%;padding:0.9rem 1rem;border-radius:var(--radius-btn);border:1px solid color-mix(in oklab,var(--color-text) 12%, transparent);background:var(--color-bg); font-size: 1rem;}
    .input:focus {outline:2px solid color-mix(in oklab,var(--color-primary) 35%, transparent);outline-offset:2px}
    .data-section{display:grid;gap:0.75rem}
    .data-row{display:flex;justify-content:space-between;gap:0.75rem;align-items:center;padding:0.75rem 1rem;border:1px solid color-mix(in oklab,var(--color-text) 8%, transparent);border-radius:var(--radius-btn);background:color-mix(in oklab,var(--color-bg) 55%, var(--color-surface)); font-size: 1rem;}
    .data-row span{word-break:break-word}
    
    @media (max-width: 700px){
      .shell{padding-bottom:calc(12rem + env(safe-area-inset-bottom))}
      .import-grid{grid-template-columns:1fr}
      .toolbar-row{display:grid;grid-template-columns:1fr 1fr}
      .console-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M5 6c3-2 11-2 14 0"/><path d="M7 10c2-1 8-1 10 0"/><path d="M12 4v16"/><path d="M9 18c0 1.7 1.3 2 3 2s3-.3 3-2"/>
          </svg>
        </div>
        <div>
          <h1>Meal Sync Pro</h1>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" type="button" data-theme-toggle aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="ghost-btn" type="button" id="openDataBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          CookBook
        </button>
      </div>
    </header>

    <main id="main">
      <section class="hero">
        <div class="hero-grid">
          <h2 id="hero-title">Plan Your Day</h2>
        </div>
        <div class="stats">
          <article class="stat" style="cursor:pointer;" data-open-cookbook="breakfast"><span class="subtle">Breakfast</span><strong id="countBreakfast">0</strong></article>
          <article class="stat" style="cursor:pointer;" data-open-cookbook="lunch"><span class="subtle">Lunch</span><strong id="countLunch">0</strong></article>
          <article class="stat" style="cursor:pointer;" data-open-cookbook="dinner"><span class="subtle">Dinner</span><strong id="countDinner">0</strong></article>
        </div>
      </section>

      <section class="section">
        <div id="suggestions" class="cards" aria-live="polite">
          <div class="empty">
            <h3>Loading database from Google Drive...</h3>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="bottom-console">
    <div class="console-grid">
      <button id="fridgeBtn" class="success-btn" type="button"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Fridge Match</button>
      <button id="surpriseBtn" class="accent-btn" type="button"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" fill="#1a73e8" opacity="0.15"/><circle cx="12" cy="12" r="10" stroke="#1a73e8" stroke-width="1.8"/><ellipse cx="12" cy="12" rx="4.5" ry="10" stroke="#34a853" stroke-width="1.5" fill="none"/><line x1="2" y1="12" x2="22" y2="12" stroke="#fbbc05" stroke-width="1.8"/><line x1="4.5" y1="7" x2="19.5" y2="7" stroke="#ea4335" stroke-width="1.3" opacity="0.7"/><line x1="4.5" y1="17" x2="19.5" y2="17" stroke="#ea4335" stroke-width="1.3" opacity="0.7"/></svg> Chef Special!</button>
      <button id="generateBtn" class="primary-btn" type="button">
        <span style="font-size:1.4rem; line-height:1;">🎲🎲</span> Plan Meals
      </button>
    </div>
  </div>

  <div id="dataModal" class="modal" aria-hidden="true">
    <section class="dialog">
      <div class="dialog-head">
        <h4>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          CookBook
        </h4>
        <button class="icon-btn" id="closeDataBtn" type="button">✕</button>
      </div>
      
      <div class="dialog-content-scroll">
        <div class="dialog-tools">
          <div class="import-grid">
            <label class="import-label" for="fileUploadInput">Upload image, PDF, DOCX, Excel</label>
            <label class="import-label" for="cameraCaptureInput">Open camera</label>
            <input id="fileUploadInput" class="hidden" type="file" accept="image/*,.pdf,.docx,.xlsx,.xls" />
            <input id="cameraCaptureInput" class="hidden" type="file" accept="image/*" capture="environment" />
          </div>
          <div id="uploadStatus" class="status" role="status"></div>
          <div class="toolbar-row">
            <button id="exportExcelBtn" class="ghost-btn" type="button" style="width:100%;">Export to Excel</button>
          </div>
        </div>
        <div class="dialog-body">
          
          <section class="panel" id="reviewQueuePanel" style="display:none; border-color:var(--color-success);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:12px;">
              <h5 style="margin:0; color:var(--color-success);">Pending Additions Queue</h5>
              <button id="submitApprovalBtn" class="primary-btn" type="button" style="background: var(--color-success); color: #fff;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Sync to Sheet
              </button>
            </div>
            <ul class="review-queue-list" id="reviewQueueList"></ul>
          </section>

          <section id="dashboardView" class="stack">
            <div class="panel">
              <h5>Add manual entry</h5>
              <div class="stack">
                <input class="input" id="unified-breakfast" placeholder="Breakfast item" />
                <input class="input" id="unified-lunch" placeholder="Lunch item" />
                <input class="input" id="unified-dinner" placeholder="Dinner item" />
                <button id="saveUnifiedBtn" class="primary-btn" type="button">Queue Manual Entry</button>
              </div>
            </div>
            <div id="tableSections" class="stack"></div>
          </section>
        </div>
      </div>
    </section>
  </div>

  <div id="fridgeModal" class="modal" aria-hidden="true">
    <section class="dialog small">
      <div class="dialog-head">
        <div>
          <h4 id="fridgeTitle">Fridge Match</h4>
          <p class="subtle">Checks database first. If empty, opens internet search.</p>
        </div>
        <button class="icon-btn" id="closeFridgeBtn" type="button">✕</button>
      </div>
      <div class="dialog-content-scroll">
        <div class="dialog-body">
          <div class="panel">
            <h5>Ingredients</h5>
            <div class="stack">
              <input id="fridgeIngredientsInput" class="input" placeholder="Paneer, tomato, capsicum, potato" />
              <button id="submitFridgeIngredientsBtn" class="success-btn" type="button">Match ingredients</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // LIVE SCRIPT INSTALLED HERE (Will handle GET syncs properly)
    const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbwY1uO95E1jLuSoeIdTrGVe8IEsjpt3O7xlCdkwKOV9l_T68PwghZc0C4jrlJlx6c5h6g/exec";

    (() => {
      const themeBtn = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;
      let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', theme);
      const renderThemeIcon = () => {
        themeBtn.innerHTML = theme === 'dark'
          ? '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
          : '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      };
      renderThemeIcon();
      themeBtn.addEventListener('click', () => { theme = theme === 'dark' ? 'light' : 'dark'; root.setAttribute('data-theme', theme); renderThemeIcon(); });
    })();

    const freshSeedData = { breakfast: [], lunch: [], dinner: [] };

    function getMealTag(name) {
      const low = String(name || '').toLowerCase();
      const nonVegKeys = ['chicken','fish','mutton','meat','prawn','prawns','goat','beef','pork','bacon','ham','steak','tuna','salmon','lamb','sausage','duck','turkey','veal','anchovy','chorizo','prosciutto','seafood','shrimp','crab','lobster','cod','halibut','sardine','mackerel','oyster','clam','squid','octopus','scallop','pepperoni','salami','pastrami','venison','haddock','tilapia','catfish','trout','pomfret','rohu','hilsa','barramundi','snapper','basa','anchovies','lard','suet','bone broth'];
      const eggKeys = ['egg', 'omelette', 'omelet', 'frittata', 'shakshuka', 'scramble', 'mayonnaise', 'quiche'];
      
      if (nonVegKeys.some(k => low.includes(k))) return { text: 'Non-Veg', cls: 'tag-nonveg' };
      if (eggKeys.some(k => low.includes(k))) return { text: 'Egg', cls: 'tag-egg' };
      return { text: 'Veg', cls: 'tag-veg' };
    }



    // Chef Special engine – unlimited, never-repeating
    let chefMealPool = [];
    let chefUsedSet = new Set();
    let chefPoolLoaded = false;
    let chefPoolLoading = false;

    // 200+ world cuisine fallback list so we never run dry

    async function loadChefPool() {
      if (chefPoolLoading || chefPoolLoaded) return;
      chefPoolLoading = true;
      try {
        // Fetch all MealDB categories in parallel
        const categories = ['Vegetarian','Vegan','Pasta','Breakfast','Side','Starter','Dessert','Miscellaneous','Goat'];
        const results = await Promise.allSettled(
          categories.map(c => fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?c=${c}`).then(r => r.json()))
        );
        let meals = [];
        results.forEach(r => {
          if (r.status === 'fulfilled' && r.value.meals) {
            meals = meals.concat(r.value.meals.map(m => m.strMeal));
          }
        });

        // Also search by first letter across all letters for maximum variety
        const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const letterResults = await Promise.allSettled(
          letters.map(l => fetch(`https://www.themealdb.com/api/json/v1/1/search.php?f=${l}`).then(r => r.json()))
        );
        letterResults.forEach(r => {
          if (r.status === 'fulfilled' && r.value.meals) {
            meals = meals.concat(r.value.meals.map(m => m.strMeal));
          }
        });

        // Dedupe, filter non-veg, shuffle
        const unique = [...new Set(meals)].filter(n => getMealTag(n).text !== 'Non-Veg');
        // Fisher-Yates shuffle
        for (let i = unique.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [unique[i], unique[j]] = [unique[j], unique[i]];
        }
        chefMealPool = unique.length > 0 ? unique : [...CHEF_FALLBACK];
        chefPoolLoaded = true;
      } catch {
        chefMealPool = [...CHEF_FALLBACK];
        chefPoolLoaded = true;
      }
      chefPoolLoading = false;
    }

    async function fetchSurpriseMealFromInternet() {
      // Ensure pool is loaded
      if (!chefPoolLoaded) await loadChefPool();

      // Pick a meal not yet used in this session
      const available = chefMealPool.filter(m => !chefUsedSet.has(m));

      // If all used, reset used set but keep pool (start cycling again fresh)
      if (available.length === 0) {
        chefUsedSet.clear();
        // Shuffle pool again for variety
        for (let i = chefMealPool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [chefMealPool[i], chefMealPool[j]] = [chefMealPool[j], chefMealPool[i]];
        }
        return fetchSurpriseMealFromInternet();
      }

      const pick = available[Math.floor(Math.random() * available.length)];
      chefUsedSet.add(pick);
      return pick;
    }

    function queueMealForApproval(category, mealName) {
      const normalized = normalizeSuggestionToMealName(mealName);
      const lowName = normalized.toLowerCase();
      
      if (state.db[category].some(m => m.toLowerCase() === lowName)) return false;
      if (pendingApprovals.some(m => m.category === category && m.meal.toLowerCase() === lowName)) return false;
      
      pendingApprovals.push({ category, meal: normalized });
      renderReviewQueue();
      return true;
    }

    // UPDATED SYNC FUNCTION: Uses GET to completely bypass CORS blocking issues
    async function submitQueueForApproval() {
      if (pendingApprovals.length === 0) return;
      
      const btn = document.getElementById('submitApprovalBtn');
      const originalText = btn.innerHTML;
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Syncing...`;
      
      try {
        const url = new URL(GOOGLE_SHEETS_API_URL);
        url.searchParams.append('action', 'sync_meals');
        url.searchParams.append('data', JSON.stringify(pendingApprovals));

        const response = await fetch(url.toString());
        const result = await response.json();
        
        if (result.success) {
            pendingApprovals.forEach(item => { state.db[item.category].push(item.meal); });
            dedupeDb();
            refreshCounts();
            renderSpreadsheetModal();

            pendingApprovals = [];
            renderReviewQueue();
            
            btn.innerHTML = "✓ Synced successfully";
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        } else {
            throw new Error(result.error || 'Sync Failed');
        }
      } catch (err) {
        console.error('Failed to sync', err);
        btn.innerHTML = originalText;
        alert('Sync failed. Please ensure Google Apps Script is updated with the latest code and deployed as a New Version.');
      }
    }

    function cookedWithinAWeek(mealName) {
      const now = Date.now();
      return state.cookingHistory.find(entry => entry.name.toLowerCase() === mealName.toLowerCase() && now - entry.timestamp < 7 * 24 * 60 * 60 * 1000);
    }

    function getCandidatePool(categoryArr) {
      if (!categoryArr.length) return ['No meals added'];
      return categoryArr;
    }

    function pickUniqueMeal(categoryArr, excludedNames = []) {
      const pool = getCandidatePool(categoryArr);
      const excluded = new Set(excludedNames.map(v => v.toLowerCase()));
      const uniquePool = pool.filter(meal => !excluded.has(meal.toLowerCase()));
      const source = uniquePool.length ? uniquePool : pool;
      return source[Math.floor(Math.random() * source.length)];
    }

    function buildCard(time, name, extra = {}) {
      return { time, name, isLocked: !!extra.isLocked, cookedRecently: !!cookedWithinAWeek(name), history: extra.history || [name], historyIndex: extra.historyIndex !== undefined ? extra.historyIndex : 0 };
    }

    function logSingleMealSelection(mealName, timeOfDay) {
      if (!mealName || mealName === 'No meals added') return;
      state.cookingHistory.push({ time: timeOfDay, name: mealName, timestamp: Date.now() });
      if (state.cookingHistory.length > 120) state.cookingHistory.shift();
    }

    // UPDATED: Fridge Match Fix 
    async function runFridgeMatchingPipeline() {
      const raw = document.getElementById('fridgeIngredientsInput').value.trim();
      if (!raw) return;
      const items = raw.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
      const findMatches = pool => pool.filter(meal => items.some(ingredient => meal.toLowerCase().includes(ingredient)));
      
      const bMatches = findMatches(state.db.breakfast);
      const lMatches = findMatches(state.db.lunch);
      const dMatches = findMatches(state.db.dinner);
      
      closeModal(els.fridgeModal);

      // Immediately open internet search tabs
      const searchQ = encodeURIComponent(`${items.join(' ')} recipes`);
      window.open(`https://www.google.com/search?q=${searchQ}`, '_blank', 'noopener,noreferrer');
      window.open(`https://www.youtube.com/results?search_query=${searchQ}`, '_blank', 'noopener,noreferrer');

      // Populate with ONLY local database matches
      const deck = [];
      if (bMatches.length > 0) deck.push(buildCard('Breakfast', bMatches[Math.floor(Math.random() * bMatches.length)]));
      if (lMatches.length > 0) deck.push(buildCard('Lunch', lMatches[Math.floor(Math.random() * lMatches.length)]));
      if (dMatches.length > 0) deck.push(buildCard('Dinner', dMatches[Math.floor(Math.random() * dMatches.length)]));

      if (deck.length > 0) {
         renderOutputDeck(deck);
      } else {
         els.suggestions.innerHTML = `
          <div class="empty" style="border-color: var(--color-success);">
            <h3 style="color: var(--color-success);">Internet Search Triggered!</h3>
            <p class="subtle">We couldn't find any matches in your CookBook for <b>${items.join(', ')}</b>.</p>
            <p class="subtle" style="margin-top:0.5rem;">New tabs for Google and YouTube have been opened to help you find a recipe. If you find something good, don't forget to add it to your CookBook!</p>
          </div>`;
      }
    }

    async function refreshSpecificCategoryCard(index, direction = 'next') {
      const card = state.currentSuggestions[index];
      if (!card || card.isLocked) return;

      const isChefCard = state.chefMode || card.time.includes('🌍') || card.time.includes('Internet');

      // Chef Special: ALWAYS fetch a fresh name from the internet — skip history entirely
      if (direction === 'next' && isChefCard) {
        const newMealName = await fetchSurpriseMealFromInternet();
        card.history.push(newMealName);
        card.historyIndex = card.history.length - 1;
        card.name = newMealName;
        card.cookedRecently = !!cookedWithinAWeek(newMealName);
        renderOutputDeck(state.currentSuggestions);
        return;
      }

      if (direction === 'prev') {
  if (card.historyIndex > 0) {
    card.historyIndex--;
    card.name = card.history[card.historyIndex];
    card.cookedRecently = !!cookedWithinAWeek(card.name);
    renderOutputDeck(state.currentSuggestions);
  }
  return;
}


      // Normal cards: replay history first, then pick fresh from sheet
      if (card.historyIndex < card.history.length - 1) {
        card.historyIndex++;
        card.name = card.history[card.historyIndex];
        card.cookedRecently = !!cookedWithinAWeek(card.name);
        renderOutputDeck(state.currentSuggestions);
        return;
      }

      const cleanKey = card.time.replace('🌍 ', '').split(' ')[0].toLowerCase();
      const used = state.currentSuggestions.filter((_, i) => i !== index).map(item => item.name);
      const newMealName = pickUniqueMeal(state.db[cleanKey], used);
      card.history.push(newMealName);
      card.historyIndex = card.history.length - 1;
      card.name = newMealName;
      card.cookedRecently = !!cookedWithinAWeek(newMealName);
      renderOutputDeck(state.currentSuggestions);
    }

      renderOutputDeck(state.currentSuggestions);
    }

    }

    function exportExcel() {
      const max = Math.max(state.db.breakfast.length, state.db.lunch.length, state.db.dinner.length);
      const rows = [['Breakfast','Lunch','Dinner']];
      for (let i = 0; i < max; i++) rows.push([state.db.breakfast[i] || '', state.db.lunch[i] || '', state.db.dinner[i] || '']);
      const worksheet = XLSX.utils.aoa_to_sheet(rows);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'Meals');
      XLSX.writeFile(workbook, 'MealSyncDatabase.xlsx');
    }

    async function handleFileRouting(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const name = file.name.toLowerCase();
      els.uploadStatus.textContent = 'Processing file…';
      try {
        if (file.type.startsWith('image/')) {
          if (!window.Tesseract) throw new Error('Tesseract failed to load.');
          const result = await Tesseract.recognize(file, 'eng');
          parseTextPool(result.data.text);
        } else if (name.endsWith('.pdf')) {
          await processPDF(file);
        } else if (name.endsWith('.docx')) {
          await processDocx(file);
        } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
          await processExcel(file);
        }
      } catch (error) { els.uploadStatus.textContent = 'Import failed: ' + error.message; } 
      finally { event.target.value = ''; }
    }

    async function processPDF(file) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const arr = new Uint8Array(await file.arrayBuffer());
      const pdf = await pdfjsLib.getDocument({ data: arr }).promise;
      const chunks = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        chunks.push(content.items.map(item => item.str).join(' '));
      }
      parseTextPool(chunks.join('\n'));
    }

    async function processDocx(file) {
      const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
      parseTextPool(result.value);
    }

    async function processExcel(file) {
      const workbook = XLSX.read(new Uint8Array(await file.arrayBuffer()), { type: 'array' });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
      const headers = rows[0].map(h => String(h || '').toLowerCase().trim());
      const bIdx = headers.indexOf('breakfast'); const lIdx = headers.indexOf('lunch'); const dIdx = headers.indexOf('dinner');
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (bIdx > -1 && row[bIdx]) state.db.breakfast.push(String(row[bIdx]).trim());
        if (lIdx > -1 && row[lIdx]) state.db.lunch.push(String(row[lIdx]).trim());
        if (dIdx > -1 && row[dIdx]) state.db.dinner.push(String(row[dIdx]).trim());
      }
      dedupeDb(); refreshCounts(); renderSpreadsheetModal(); els.uploadStatus.textContent = 'Excel parsed.';
    }

    function parseTextPool(text) {
      const lines = text.replace(/[\u2022•]/g, ',').split(/\n|,|;/).map(line => line.trim()).filter(line => line.length > 2);
      lines.forEach(line => {
        const low = line.toLowerCase();
        if (low.includes('breakfast') || low.includes('morning')) state.db.breakfast.push(line.replace(/breakfast|morning/ig, '').replace(/[-:]/g, '').trim());
        else if (low.includes('lunch') || low.includes('afternoon')) state.db.lunch.push(line.replace(/lunch|afternoon/ig, '').replace(/[-:]/g, '').trim());
        else if (low.includes('dinner') || low.includes('night')) state.db.dinner.push(line.replace(/dinner|night/ig, '').replace(/[-:]/g, '').trim());
        else { const shortest = ['breakfast','lunch','dinner'].sort((a,b) => state.db[a].length - state.db[b].length)[0]; state.db[shortest].push(line); }
      });
      dedupeDb(); refreshCounts(); renderSpreadsheetModal(); els.uploadStatus.textContent = 'Text parsed.';
    }

    function openModal(modal) { modal.classList.add('open'); modal.setAttribute('aria-hidden','false'); }
    function closeModal(modal) { modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); }
    function escapeHtml(str) { return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

    document.getElementById('generateBtn').addEventListener('click', () => { state.chefMode = false; generateDefaultSuggestions(); });
    document.getElementById('submitApprovalBtn').addEventListener('click', submitQueueForApproval);
    
    document.getElementById('surpriseBtn').addEventListener('click', async function() {
      state.chefMode = true;
      // Reset used set for a fresh session each time Chef Special is tapped
      chefUsedSet.clear();
      els.suggestions.innerHTML = '<div class="empty"><h3>🌍 Fetching global inspirations...</h3><p class="subtle" style="margin-top:0.5rem;">Searching world cuisine database...</p></div>';
      const [b, l, d] = await Promise.all([ fetchSurpriseMealFromInternet(), fetchSurpriseMealFromInternet(), fetchSurpriseMealFromInternet() ]);
      renderOutputDeck([ buildCard("🌍 Breakfast", b), buildCard("🌍 Lunch", l), buildCard("🌍 Dinner", d) ]);
    });

    document.getElementById('fridgeBtn').addEventListener('click', () => openModal(els.fridgeModal));
    document.getElementById('submitFridgeIngredientsBtn').addEventListener('click', runFridgeMatchingPipeline);
    document.getElementById('openDataBtn').addEventListener('click', () => { openModal(els.dataModal); renderSpreadsheetModal(); });
    document.getElementById('closeDataBtn').addEventListener('click', () => closeModal(els.dataModal));
    document.getElementById('closeFridgeBtn').addEventListener('click', () => closeModal(els.fridgeModal));
    document.getElementById('saveUnifiedBtn').addEventListener('click', addUnifiedEntries);
    document.getElementById('exportExcelBtn').addEventListener('click', exportExcel);
    document.getElementById('fileUploadInput').addEventListener('change', handleFileRouting);
    document.getElementById('cameraCaptureInput').addEventListener('change', handleFileRouting);

    els.suggestions.addEventListener('click', async event => {
      const button = event.target.closest('[data-action]');
      if (!button) return;
      const index = Number(button.dataset.index);
        
      if (button.dataset.action === 'prev') await refreshSpecificCategoryCard(index, 'prev');
      if (button.dataset.action === 'next') await refreshSpecificCategoryCard(index, 'next');
      if (button.dataset.action === 'toggle-explore') {
        const exploreDiv = document.getElementById(`explore-${index}`);
        exploreDiv.style.display = (exploreDiv.style.display === 'none' || exploreDiv.style.display === '') ? 'grid' : 'none';
      }
      if (button.dataset.action === 'lock') lockChoiceIntoExclusionMemory(index);
      if (button.dataset.action === 'google') openRecipeSearch(index, 'google');
      if (button.dataset.action === 'youtube') openRecipeSearch(index, 'youtube');
      if (button.dataset.action === 'nutrition') openNutritionSearch(index);
      if (button.dataset.action === 'internet') openMoreOptions(index);
      
      // WhatsApp Update
      if (button.dataset.action === 'whatsapp') {
         const card = state.currentSuggestions[index];
         const mealName = card.name;
         const googleLink = `https://www.google.com/search?q=${encodeURIComponent(mealName + ' recipe')}`;
         const ytLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(mealName + ' recipe')}`;
         const text = `*${mealName}*\n\nGoogle Recipe:\n${googleLink}\n\nYouTube Recipe:\n${ytLink}`;
         window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank', 'noopener,noreferrer');
      }

      if (button.dataset.action === 'save-db') {
        const card = state.currentSuggestions[index];
        const rawTime = card.time.replace(/^[^a-zA-Z]+/, '').trim();
const category = rawTime.split(' ')[0].toLowerCase();

        const normalized = normalizeSuggestionToMealName(card.name);
        
        if (normalized && normalized.length > 2 && ['breakfast','lunch','dinner'].includes(category)) {

           const success = queueMealForApproval(category, normalized);
           if (success) {
               button.classList.add('added');
               button.innerHTML = `✓ Added`;
           }
        }
      }
    });

    [els.dataModal, els.fridgeModal].forEach(modal => modal.addEventListener('click', event => { if (event.target === modal) closeModal(modal); }));
    document.querySelectorAll('[data-open-cookbook]').forEach(stat => {
      stat.addEventListener('click', () => {
        const category = stat.dataset.openCookbook;
        openModal(els.dataModal);
        renderSpreadsheetModal();
        setTimeout(() => {
          const target = els.tableSections.querySelector(`[data-section="${category}"]`);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      });
    });

    document.addEventListener('keydown', event => { if (event.key === 'Escape') { closeModal(els.dataModal); closeModal(els.fridgeModal); } });

    async function loadFromGoogleSheets() {
      if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.includes("PASTE")) {
        dedupeDb(); refreshCounts(); renderOutputDeck([]); renderSpreadsheetModal(); return;
      }
      els.suggestions.innerHTML = '<div class="empty"><h3>Loading database from Google Drive...</h3></div>';
      try {
        const res = await fetch(GOOGLE_SHEETS_API_URL);
        const data = await res.json();
        if (data.breakfast || data.lunch || data.dinner) {
          state.db.breakfast = data.breakfast || [];
          state.db.lunch = data.lunch || [];
          state.db.dinner = data.dinner || [];
          dedupeDb(); refreshCounts(); renderSpreadsheetModal();
          els.suggestions.innerHTML = `<div class="empty"><h3>Ready to Plan?</h3><p class="subtle">Generate balanced meal options, search nutrition quickly, and find ingredient-based fallbacks online.</p></div>`;
        }
      } catch (e) {
        dedupeDb(); refreshCounts(); renderSpreadsheetModal();
        els.suggestions.innerHTML = '<div class="empty"><h3>Loaded offline database (Google Sheet sync failed).</h3></div>';
      }
    }
    loadFromGoogleSheets();
    loadChefPool(); // preload chef meal pool in background
  </script>
</body>
